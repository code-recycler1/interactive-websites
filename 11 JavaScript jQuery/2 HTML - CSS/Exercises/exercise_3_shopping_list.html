<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3 - Shopping List</title>
    <link rel="stylesheet" href="../../css/exercises.css">
</head>

<body>
    <div id="content">
        <h2>Shopping list</h2>
        Which item do you want to add?
        <input type="text" id="txtNameItem" placeholder="which item?" />
        <button id="btnAddItem">Add</button>

        <!-- Empty list — items are injected here by jQuery -->
        <ul id="myShoppingList"></ul>
    </div>

    <script src="../../js/jquery-3.4.1.min.js"></script>
    <script>
        $(document).ready(function () {

            /*
             * ADD ITEM — runs when the "Add" button is clicked.
             */
            $('#btnAddItem').on('click', function () {

                /*
                 * Step 1 — read the item name from the text field.
                 */
                let itemToAdd = $('#txtNameItem').val();

                /*
                 * Step 2 — build the HTML for the remove link.
                 *
                 * The link is stored in a variable so the <li> string stays readable.
                 * class="removeMe" is the hook that the delegated click handler
                 * below uses to identify remove links.
                 *
                 * href="#" prevents page navigation. In a production app,
                 * href="javascript:void(0)" or event.preventDefault() would
                 * be cleaner, but href="#" is fine for this exercise.
                 *
                 * ⚠️  XSS NOTE: itemToAdd comes directly from user input and is
                 * being inserted via .prepend() which renders raw HTML. If a user
                 * types '<script>...</scr..' it will be injected as live HTML.
                 * For production, sanitise `itemToAdd` before inserting it, or
                 * build the <li> element using jQuery's DOM methods instead:
                 * let $li = $('
                 <li>').text(itemToAdd).append(' ').append(removeLink);
                 */
                let removeLink = '<a href="#" class="removeMe">remove</a>';

                /*
                * Step 3 — prepend the new <li> to the top of the list.
                *
                * .prepend() inserts as the FIRST child, so the most recently
                * added item always appears at the top — like a stack.
                * Use .append() instead if you want new items at the bottom.
                */
                $('#myShoppingList').prepend('<li>' + itemToAdd + ' ' + removeLink + '</li>');

                /*
                * Step 4 — clear the text field so the user can immediately
                * type the next item without manually deleting the previous one.
                */
                $('#txtNameItem').val('');
            });

            /*
            * REMOVE ITEM — delegated click handler on the list container.
            *
            * WHY DELEGATION IS REQUIRED HERE:
            * The "remove" links are created dynamically — they do not exist
            * in the DOM when the page loads. A direct binding like
            * $('.removeMe').on('click', ...) would find zero elements at
            * startup and never work for any dynamically added links.
            *
            * By binding to the stable parent #myShoppingList with 'click'
            * and the delegate selector '.removeMe', jQuery intercepts any
            * click that bubbles up from a .removeMe element — including ones
            * added to the DOM after this line executed.
            *
            * WHAT THE HANDLER DOES:
            * $(this) is the clicked <a class="removeMe"> element.
            * .parent('li') traverses UP to its containing <li>.
            * .remove() deletes that <li> — and the link inside it — entirely.
            */
            $('#myShoppingList').on('click', '.removeMe', function () {
                $(this).parent('li').remove();
            });

            /*
            * OPTIONAL — clear the text field when the user clicks into it.
            * Commented out here; uncomment to activate.
            *
            * $('#txtNameItem').on('click', function () {
            * $(this).val('');
            * });
            */
        });
    </script>
</body>

</html>
