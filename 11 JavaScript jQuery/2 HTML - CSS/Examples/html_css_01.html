<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>jQuery HTML-CSS: 1 - Direct CSS value</title>
</head>

<body>
	<h1>jQuery html-css examples</h1>
	<p>This is the first paragraph.</p>
	<p>This is the second paragraph.</p>
	<p>This is the third paragraph.</p>

	<!-- Load jQuery from a local file -->
	<script src="../../js/jquery-3.6.0.js"></script>
	<script>
		$(function () {
			/*
			 * SET A SINGLE CSS PROPERTY USING A DIRECT VALUE
			 *
			 * .css(propertyName, value) — the simplest setter form.
			 * Applies the style inline to every matched element.
			 *
			 * '#9F3' is a shorthand hex colour — expands to '#99FF33',
			 * a bright lime green.
			 *
			 * All three <p> elements are selected and styled in one call.
			 */
			$('p').css('background-color', '#9F3');
		});
	</script>
</body>

</html>
