<!doctype html>
<html>

<body>
    table>tr*4>td*3{cel $}

    <!-- 
    
    table > tr*4 > td*3 { cell $ }
    │       │      │       │
    │       │      │       └── text content: "cell " followed by $
    │       │      │           $ is Emmet's auto-increment counter (1, 2, 3...)
    │       │      │
    │       │      └── each <tr> gets 3 <td> children
    │       │
    │       └── the <table> gets 4 <tr> children  (* means "repeat N times")
    │
    └── the root element is a <table>
    
    What it expands to:
    <table>
        <tr>
            <td>cell 1</td>
            <td>cell 2</td>
            <td>cell 3</td>
        </tr>
        <tr>
            <td>cell 4</td>
            <td>cell 5</td>
            <td>cell 6</td>
        </tr>
        <tr>
            <td>cell 7</td>
            <td>cell 8</td>
            <td>cell 9</td>
        </tr>
        <tr>
            <td>cell 10</td>
            <td>cell 11</td>
            <td>cell 12</td>
        </tr>
    </table>
    
    -->
</body>

</html>
