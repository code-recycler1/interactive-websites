<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Animation: 6 bis - .fadeTo() on images (opacity hover effect)</title>
	<link rel="stylesheet" href="../../css/custom.css">
</head>

<body>
	<img src="../../img/kitten1.jpg" class="fadeable" />
	<img src="../../img/kitten2.jpg" class="fadeable" />
	<img src="../../img/kitten3.jpg" class="fadeable" />

	<script src="../../js/jquery-3.4.1.min.js"></script>
	<script>
		$(function () {

			/*
			 * .fadeTo(duration, opacity) — animates TO a specific opacity value
			 * rather than fully in or fully out.
			 *
			 * KEY DIFFERENCE FROM .fadeIn() / .fadeOut():
			 *   .fadeIn()  always animates TO   opacity 1 (fully visible)
			 *   .fadeOut() always animates TO   opacity 0 (then display:none)
			 *   .fadeTo()  animates TO any opacity between 0.0 and 1.0
			 *              and NEVER sets display:none — the element always
			 *              stays in the layout flow
			 *
			 * CHAINED EVENTS — two .on() calls chained on the same selection:
			 *   mouseover → fade TO opacity 1.0 (fully visible)
			 *   mouseout  → fade TO opacity 0.4 (back to the dimmed default)
			 *
			 * 'fast' ≈ 200ms — quick enough to feel responsive but slow
			 * enough to be a smooth transition rather than a snap.
			 *
			 * $(this) refers to the specific image being hovered,
			 * so each image responds independently.
			 *
			 * NOTE: mouseover and mouseout BUBBLE — they fire even when
			 * the cursor moves over a child element inside the target.
			 * For images this makes no practical difference since <img>
			 * has no children, but on elements with children,
			 * mouseenter / mouseleave are the safer choice.
			 */
			$('img')
				.on('mouseover', function () {
					$(this).fadeTo('fast', 1.0); // fully visible on hover
				})
				.on('mouseout', function () {
					$(this).fadeTo('fast', 0.4); // dimmed again on mouseout
				});

		});
	</script>
</body>

</html>
