<html lang="en">

<head>

            <div class="col-md mb-2">
                <select class="form-select" name="medal" id="medal">

                    <option value="silver">Silver</option>
                    <option value="bronze">Bronze</option>
                </select>
            </div>
            <div class="col-md mb-2">
                <div class="d-grid">
                    <input type="button" name="addAthlete" id="addAthlete" value="Add athlete" class="btn btn-success">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <h2>Medal Overview</h2>
                <ul id="list">

                </ul>
            </div>
        </div>
    </main>
