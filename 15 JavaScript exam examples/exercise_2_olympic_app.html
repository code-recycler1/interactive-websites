<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2 - Olympic Summer Games 2020 Athletes</title>
    <link rel="shortcut icon" href="#">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
</head>

<body>
    <div class="container p-4">
        <h4>Exercise 2 - Olympic Summer Games 2020 Athletes</h4>
        <form name="atlForm" id="atlForm">
            <div class="form-row">
                <!-- Search field — filters by last name (case-insensitive) -->
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="search" class="text-danger">Search athlete (by last name)</label>
                        <input type="text" class="form-control" id="search">
                    </div>
                </div>

                <!-- Checkbox — filters to Belgian athletes only (country.id === 19) -->
                <div class="col-md-4 ml-5">
                    <div class="form-group">
                        <label class="text-danger">Belgium only</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="inlineChkTeam1" name="inlineChkTeam1"
                                value="19">
                            <label class="form-check-label" for="inlineChkTeam1">
                                Belgium (19)
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Button to sum all amountReceived in the current workingData -->
                <div class="col-md-3">
                    <a href="" class="btn btn-danger mb-2" id="buttonReceived">Sponsorships received</a>
                </div>
            </div>
            <button type="submit" class="btn btn-primary mb-2" id="buttonSearch">Search</button>
        </form>

        <div class="mt-2">
            <!-- Result count — hidden until a search is performed -->
            <div id="nFound" class="alert alert-success" style="display: none;" role="alert"></div>

            <table class="table">
                <thead class="thead-light">
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">Last name</th>
                        <th scope="col">First name</th>
                        <th scope="col">Gender</th>
                        <th scope="col">Country</th>
                        <th scope="col" class="text-right">Received</th>
                    </tr>
                </thead>
                <!-- Table rows are injected here by showData() -->
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- GLOBALS ---
        // All querySelector calls in one place — easy to find and update
        const form = document.querySelector('#atlForm');
        const searchInput = document.querySelector('#search');
        const checkbox = document.querySelector('#inlineChkTeam1');
        const btnSearch = document.querySelector('#buttonSearch');
        const btnReceived = document.querySelector('#buttonReceived');
        const nFound = document.querySelector('#nFound');
        const tbody = document.querySelector('#tbody');

        // The array we work with throughout — populated by getData(), mutated by filters
        let workingData = [];

        // JSON file path — change here if the file moves
        const JSON_FILE = 'json/athletes_og_output.json';

        // --- EVENT LISTENERS ---
        // Search button — submit event covers both button click and Enter key
        form.addEventListener('submit', getData);

        // Checkbox — re-run the full pipeline when the Belgium filter is toggled
        checkbox.addEventListener('change', getData);

        // Outstanding sponsorships button — prevent the href="#" from jumping to top
        btnReceived.addEventListener('click', (e) => {
            e.preventDefault();
            receiveSponsors();
        });

        // --- getData() ---
        // Fetches the JSON file and stores the result in workingData.
        // Called on form submit and on checkbox change.
        function getData(e) {
            e.preventDefault(); // Stop form submission / page reload

            fetch(JSON_FILE)
                .then(response => {
                    if (response.ok) {
                        return response.json();
                    } else {
                        // Non-2xx status — log the code and stop processing
                        console.log(`Seems there is a problem... Status code: ${response.status}`);
                    }
                })
                .then(data => {
                    if (!data) return; // Guard against the error branch above

                    // Clone the array so workingData is independent of the original.
                    // Spread syntax creates a shallow copy — sufficient here because
                    // we only filter/reassign the array, never mutate individual objects.
                    workingData = [...data];

                    searchAthletes();
                })
                .catch(err => {
                    // Network-level failures (no file, CORS, offline)
                    console.log(`Error: ${err.status} — ${err.message}`);
                });
        }

        // --- searchAthletes() ---
        // Filters workingData by the search term (matched anywhere in last name).
        // Comparison is case-insensitive — "ER" finds all athletes with "er" in their name.
        function searchAthletes() {
            const searchValue = searchInput.value.trim().toLowerCase();

            if (searchValue !== '') {
                workingData = workingData.filter(athlete =>
                    athlete.person.lastName.toLowerCase().includes(searchValue)
                );
            }

            showData();
        }

        // --- showData() ---
        // Makes the result count visible, clears previous rows,
        // applies the Belgium filter, then renders the table.
        function showData() {
            // Make the result count div visible
            nFound.style.display = 'block';

            // Clear any rows from the previous search
            tbody.innerHTML = '';

            // Apply the Belgium filter — returns either full or filtered array
            workingData = filterAthletes();

            if (workingData.length === 0) {
                // No results — show a warning and leave the table empty
                nFound.className = 'alert alert-danger';
                nFound.innerHTML = '<strong>0</strong> athletes found.';
                return;
            }

            // Show the count in the success alert
            nFound.className = 'alert alert-success';
            nFound.innerHTML = `<strong>${workingData.length}</strong> athlete${workingData.length !== 1 ? 's' : ''} found.`;

            // Build all rows as a single string — one DOM write is more efficient
            // than appending a row on every iteration.
            let rows = '';
            workingData.forEach(athlete => {
                rows +=
                    `<tr>
                        <td><strong>${athlete.id}</strong></td>
                        <td>${athlete.person.lastName}</td>
                        <td>${athlete.person.firstName}</td>
                        <td>${athlete.person.gender}</td>
                        <td>${athlete.country.name} (${athlete.country.id})</td>
                        <td class="text-right">€${athlete.amountReceived.toLocaleString()}</td>
                    </tr>`;
            });
            tbody.innerHTML = rows;
        }

        // --- filterAthletes() ---
        // Checks whether the Belgium checkbox is ticked.
        // If yes, returns only athletes whose country.id matches the checkbox value (19).
        // If no, returns the full workingData array unchanged.
        function filterAthletes() {
            if (checkbox.checked) {
                // checkbox.value is "19" (string) — convert for strict comparison
                const countryId = parseInt(checkbox.value);
                const countryData = workingData.filter(athlete =>
                    athlete.country.id === countryId
                );
                return countryData;
            }
            return workingData;
        }

        // --- receiveSponsors() ---
        // Sums all amountReceived values in the current workingData using reduce().
        // Shows an alert with the total — the table remains visible after dismissal.
        function receiveSponsors() {
            if (workingData.length === 0) {
                alert('No athletes in the list — please perform a search first.');
                return;
            }

            // reduce() accumulates the total by adding each athlete's amountReceived.
            // The second argument (0) is the initial value of the accumulator.
            const total = workingData.reduce(
                (accumulator, athlete) => accumulator + athlete.amountReceived,
                0
            );

            alert(
                `Sponsorships received for ${workingData.length} athlete${workingData.length !== 1 ? 's' : ''}:\n` +
                `€${total.toLocaleString()}`
            );
        }
    </script>
</body>

</html>
