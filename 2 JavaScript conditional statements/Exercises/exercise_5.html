<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript conditional statements - Exercise 5</title>
</head>

<body>

    <script>
        // Ask the user to enter 3 separate numbers

        // Get three numbers from the user
        let num1 = parseInt(prompt("Enter the first number:", "0"));
        let num2 = parseInt(prompt("Enter the second number:", "0"));
        let num3 = parseInt(prompt("Enter the third number:", "0"));

        // ----- MAIN LOGIC: DETERMINE ORDER OF NUMBERS -----

        let smallest, middle, largest;

        // METHOD 1: COMPREHENSIVE IF-ELSE COMPARISONS
        // Compare all three numbers using nested conditions
        // This approach explicitly handles all 6 possible ordering scenarios

        if (num1 <= num2 && num1 <= num3) {
            // num1 is the smallest
            smallest = num1;

            if (num2 <= num3) {
                middle = num2;
                largest = num3;
            } else {
                middle = num3;
                largest = num2;
            }
        }
        else if (num2 <= num1 && num2 <= num3) {
            // num2 is the smallest
            smallest = num2;

            if (num1 <= num3) {
                middle = num1;
                largest = num3;
            } else {
                middle = num3;
                largest = num1;
            }
        }
        else {
            // num3 is the smallest
            smallest = num3;

            if (num1 <= num2) {
                middle = num1;
                largest = num2;
            } else {
                middle = num2;
                largest = num1;
            }
        }


        // ----- DISPLAY RESULTS -----
        // Show the results in a single alert box with formatted output
        let resultMessage = `Numbers entered: ${num1}, ${num2}, ${num3}\n\n` +
            `Smallest number: ${smallest}\n` +
            `Middle number: ${middle}\n` +
            `Largest number: ${largest}`;

        alert(resultMessage);

        // Optional: Also log to console for debugging
        console.log("Input:", num1, num2, num3);
        console.log("Smallest:", smallest, "Middle:", middle, "Largest:", largest);

    </script>
</body>

</html>
