    <title>JavaScript conditional statements - Exercise 3</title>

<body>

    <script>
        // Using switch(true) pattern to evaluate range conditions

        let number = parseInt(prompt("Enter a number between 10 and 20:", ""));


        // ----- SWITCH WITH BOOLEAN EXPRESSIONS -----
        // The switch(true) pattern evaluates each case expression
        // The first case that evaluates to true executes its block

        switch (true) {
            // Case 1: Number is less than 10
            case (number < 10):
                alert(`The number ${number} is smaller than 10.`);
                break;

            // Case 2: Number is greater than 20
            case (number > 20):
                alert(`The number ${number} is greater than 20.`);
                break;

            // Case 3: Number is between 10 and 20 (inclusive)
            // This catches all remaining numbers in range 10-20
            case (number >= 10 && number <= 20):
                // Calculate square using exponentiation operator
                let square = number ** 2;
                alert(`The number ${number} is between 10 and 20. Its square is ${square}.`);
                break;

            // Default fallback (should never reach here with valid number)
            default:
                alert("Unexpected error. Please try again.");
                break;
        }
