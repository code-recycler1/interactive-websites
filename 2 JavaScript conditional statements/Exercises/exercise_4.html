    <script>
        // Ask the user for their age
        
        let age = parseInt(prompt("Please enter your age to calculate the cinema ticket price:", ""));
        
        // Using if-else structure with clear age ranges
        
        let priceMessage = "";
        let price = 0;
        
        // Standard cinema ticket price (full price)
        const FULL_PRICE = 12.50;
        
        if (age < 5) {
            // Category a: Younger than 5 years old
            price = 0;
            priceMessage = `Age: ${age} years | Ticket price: FREE`;
        } 
        else if (age >= 5 && age <= 12) {
            // Category b: Between 5 and 12 years old (inclusive)
            price = FULL_PRICE / 2; // Half price
            priceMessage = `Age: ${age} years | Ticket price: €${price.toFixed(2)} (half price)`;
        } 
        else if (age >= 13 && age <= 54) {
            // Category c: Between 13 and 54 years old (inclusive)
            price = FULL_PRICE; // Full price
            priceMessage = `Age: ${age} years | Ticket price: €${price.toFixed(2)} (full price)`;
        } 
        else {
            // Category d: 55 years and older
            price = 0;
            priceMessage = `Age: ${age} years | Ticket price: FREE (senior)`;
        }
        
        // Show the result to the user
        alert(priceMessage);
