<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <link rel="stylesheet" href="style.css">
    <title>Exercise 3 - Lorem Picsum</title>
</head>

<body>
    <div class="container">
        <h1>Lorem Picsum <small>The Lorem Ipsum for photos.</small></h1>

        <!-- `hidden` attribute hides the spinner — removed to show it, re-added to hide it -->
        <div hidden id="spinner"></div>

        <!-- Gallery cards are injected here by makeGall() -->
        <div class="row" id="divResult"></div>
    </div>
</body>

<script>
    const spinner = document.querySelector('#spinner');
    const main = document.querySelector('#divResult');

    // --- DOMContentLoaded ---
    // Fires when the HTML is fully parsed — images and stylesheets may still be loading.
    // `async` allows `await` inside the callback.
    document.addEventListener('DOMContentLoaded', async () => {

        // Show the spinner before the request starts
        spinner.removeAttribute('hidden');

        // Await the async request — execution pauses here until makeRequest() resolves.
        // The spinner stays visible during this wait.
        const imageArray = await makeRequest();

        // Build and inject the gallery HTML from the filtered image array
        main.innerHTML = makeGall(imageArray);

        // Hide the spinner once the HTML is in the DOM.
        // Note: the spinner disappears when the HTML is injected, but the actual
        // image files (<img> src) may still be downloading in the background.
        spinner.setAttribute('hidden', '');
    });

    // --- makeRequest() ---
    // Async function that fetches 25 images from the Picsum API,
    // parses the JSON, and filters to landscape images only.
    // Returns the filtered array — awaited by the DOMContentLoaded handler above.
    const makeRequest = async () => {
        // Optional artificial delay — demonstrates the spinner and async/await pattern.
        // Remove or reduce this in production.
        await fakeTimeOut(3000);

        return await fetch('https://picsum.photos/v2/list?limit=25')
            .then(response => {
                if (!response.ok) throw new Error(`HTTP error: ${response.status}`);
                return response.json();
            })
            // Keep only landscape images — those where width is greater than height
            .then(images => images.filter(img => img.width > img.height));
    };

    // --- fakeTimeOut() ---
    // Wraps setTimeout in a Promise so it can be awaited.
    // resolve is called after `ms` milliseconds, fulfilling the Promise.
    const fakeTimeOut = (ms) => {
        return new Promise(resolve => setTimeout(resolve, ms));
    };

    // --- makeGall() ---
    // Builds a Bootstrap card grid from the filtered image array.
    // Returns an HTML string — injected into #divResult in one DOM write.
    const makeGall = (images) => {
        let html = '';

        images.forEach(item => {
            html +=
                `<div class="col-md-4">
                    <div class="card mb-4 shadow-sm">
                        <!-- download_url is the full-size image — loads after HTML injection -->
                        <img src="${item.download_url}" class="img-responsive" alt="${item.author}">
                        <div class="card-body">
                            <!-- Author name below the image -->
                            <p class="card-text">${item.author}</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="btn-group">
                                    <!-- 'url' links to the Picsum detail page for this image -->
                                    <a href="${item.url}" target="_blank"
                                        class="btn btn-primary" role="button">More info</a>
                                </div>
                                <!-- Image dimensions shown as "height x width" -->
                                <small class="text-muted">${item.height} x ${item.width}</small>
                            </div>
                        </div>
                    </div>
                </div>`;
        });

        return html;
    };
</script>

</html>
