<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Exercise 2 - Star Wars characters</title>
</head>

<body>
    <div class="container">
        <h1>Star Wars characters</h1>
        <!-- Error messages appear here — red background from Bootstrap classes on the div -->
        <div class="row bg-danger text-white px-2" id="divErr"></div>
        <!-- Pre-existing list — items appended by the fetch chain -->
        <ul id="starWarsPeopleList" class="list-group"></ul>
    </div>
</body>

<script>
    // Cache both output elements once
    const starWarsPeopleList = document.querySelector('#starWarsPeopleList');
    const divErr = document.querySelector('#divErr');

    // Fetch the first page of Star Wars people (10 results by default)
    // Change the URL to 'https://swapi.info/api/peooooople/' to trigger the error path
    fetch('https://swapi.info/api/people/')
        .then(response => {
            // response.ok is true for 2xx status codes.
            // For non-2xx (e.g. 404), we manually reject so .catch() fires.
            if (response.ok) {
                return response.json();
            } else {
                return Promise.reject({
                    status: response.status,
                    statusText: response.statusText
                });
            }
        })
        .then(json => {
            const first10People = json.slice(0, 10);
            // json.results is the array of character objects from the SWAPI response
            first10People.forEach(person => {
                const listItem = document.createElement('li');
                listItem.classList.add('list-group-item');

                // Show gender in parentheses only if it is 'male' or 'female'.
                // Any other value (e.g. 'n/a', 'hermaphrodite') is omitted entirely.
                const genderDisplay = (person.gender === 'male' || person.gender === 'female')
                    ? ` (${person.gender})`
                    : '';

                listItem.innerHTML = `<p class="m-0">${person.name}${genderDisplay}</p>`;
                starWarsPeopleList.appendChild(listItem);
            });
        })
        .catch(err => {
            // Displays the HTTP error status text in the red error div
            divErr.textContent = `Error ${err.status}: ${err.statusText}`;
        });
</script>

</html>
