<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Exercise 1 - User list</title>
</head>

<body>
    <div class="container">
        <h1>User list</h1>
        <div class="row" id="divResult">
            <!-- Pre-existing list — items are appended here by fetchUserData() -->
            <ul id="list"></ul>
        </div>
    </div>
</body>

<script>
    // Cache the list element once — reused inside forEach
    const list = document.querySelector('#list');

    // Fetch all users from the JSONPlaceholder API and render them as list items.
    // Called immediately on page load — no button click needed.
    function fetchUserData() {
        fetch('https://jsonplaceholder.typicode.com/users/')
            .then(response => {
                // fetch() resolves for all HTTP responses — check status manually
                if (!response.ok) {
                    throw new Error(`HTTP error: ${response.status} ${response.statusText}`);
                }
                return response.json(); // Parse the response body as JSON
            })
            .then(users => {
                // `users` is an array of user objects — iterate and build a list item for each
                users.forEach(user => {
                    const listItem = document.createElement('li');
                    // textContent instead of innerHTML — name is plain text, no HTML needed
                    listItem.textContent = user.name;
                    list.appendChild(listItem);
                });
            })
            .catch(err => {
                // Catches both network failures and the thrown HTTP error above
                list.innerHTML = `<li class="text-danger">Error: ${err.message}</li>`;
            });
    }

    fetchUserData();
</script>

</html>
