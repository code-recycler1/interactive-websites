<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Fetch — response methods</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Fetch — response methods</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    // Demonstrates three ways to read a fetch() response body and how to inspect headers
    async function testGitHub() {

        // --- AS JSON ---
        // Fetch a GitHub user and parse the response as a JavaScript object
        const response = await fetch('https://api.github.com/users/code-recycler1');
        const user = await response.json(); // response.json() returns a Promise
        console.log('Public repos: ' + user.public_repos);

        // --- AS TEXT ---
        // Fetch an HTML file and read its raw content as a string.
        // response.text() returns the raw response body — no JSON parsing.
        // Useful for HTML pages, CSV files, or any non-JSON content.
        const response2 = await fetch('fetch_basics.html');
        const text = await response2.text();
        console.log(text); // Logs the full HTML source as a string

        // --- HEADERS ---
        // The Response object exposes response headers via response.headers.
        // .get() retrieves a single header value by name (case-insensitive).
        console.log(response2.headers.get('Content-Type')); // e.g. "text/html; charset=utf-8"

        // Iterate over all headers as [key, value] pairs using for...of
        for (const [key, value] of response2.headers) {
            console.log(`${key} = ${value}`);
        }
    }

    testGitHub();
</script>

</html>
