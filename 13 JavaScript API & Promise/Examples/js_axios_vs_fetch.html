<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <!-- Axios is a third-party HTTP library. Install via npm or use the CDN script below. -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link rel="shortcut icon" href="#">
    <title>Axios vs Fetch</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Axios vs Fetch</h1>
            </div>
        </div>
    </div>
</body>

<script>
    // --- AXIOS ---
    // axios.get() returns a Promise.
    // On success, the response data is already parsed from JSON — no extra step needed.
    // The second argument to .then() handles errors (rejected promises).
    axios.get('https://api.github.com/users/code-recycler1')
        .then(
            response => {
                // response.data is the already-parsed JavaScript object
                console.log(response.data);
            },
            error => {
                // This second callback to .then() catches rejection
                console.log(error);
            }
        );

    // --- FETCH ---
    // fetch() is built into modern browsers — no library needed.
    // It also returns a Promise, but with one important difference:
    // the response body must be explicitly parsed with .json() in a second step.
    fetch('https://api.github.com/users/code-recycler1')
        .then(response => response.json()) // Step 1: convert raw response to JSON
        .then(data => {
            // Step 2: now `data` is a usable JavaScript object
            console.log(data);
        })
        .catch(error => console.error(error)); // Catches network failures
</script>

</html>
