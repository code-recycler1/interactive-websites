<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Promise.race()</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Promise.race()</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    // Each Promise resolves or rejects after a delay set by setTimeout.
    // The delay simulates work that takes different amounts of time (e.g. API calls).
    const p1 = new Promise((resolve, reject) => {
        setTimeout(() => resolve('one'), 1000); // Resolves after 1 second
    });
    const p2 = new Promise((resolve, reject) => {
        setTimeout(() => resolve('two'), 2000); // Resolves after 2 seconds
    });
    const p3 = new Promise((resolve, reject) => {
        setTimeout(() => resolve('three'), 3000); // Resolves after 3 seconds
    });
    const p4 = new Promise((resolve, reject) => {
        setTimeout(() => resolve('four'), 4000); // Resolves after 4 seconds
    });
    const p5 = new Promise((resolve, reject) => {
        setTimeout(() => reject(new Error('reject')), 500); // REJECTS after 0.5 seconds
    });

    // Promise.race() takes an array of Promises and settles as soon as
    // the FIRST one settles — whether it resolves or rejects.
    // All other Promises continue running internally but their results are ignored.
    //
    // With the current timings: p5 rejects at 500ms — before any other Promise resolves.
    // So .catch() fires with "reject".
    //
    // Experiment 1: change p5's timeout from 500 to 5000
    //   → p1 now resolves first at 1000ms — .then() fires with "one"
    //
    // Experiment 2: change p1's timeout from 1000 to 10000
    //   → p5 still rejects first at 500ms (or p2 resolves first at 2000ms if p5 is 5000ms)
    Promise.race([p1, p2, p3, p4, p5])
        .then(value => {
            console.log(value); // The value from whichever Promise resolved first
        })
        .catch(error => {
            console.error(error.message); // The error from whichever Promise rejected first
        });
</script>

</html>
