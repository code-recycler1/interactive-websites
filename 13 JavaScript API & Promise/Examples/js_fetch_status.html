<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fetch — status handling</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Fetch — status handling</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    const url = 'https://jsonplaceholder.typicode.com/posts';

    // This example addresses the critical gap from the basic fetch example:
    // fetch() resolves for ALL HTTP responses — even 404 and 500 errors.
    // To catch HTTP errors, you must manually inspect response.status inside .then().
    fetch(url)
        .then(response => {
            // 2xx status codes indicate success — parse and return the body
            if (response.status >= 200 && response.status <= 299) {
                return response.json();
            } else {
                // For any non-2xx status, manually throw an Error.
                // throw inside a .then() causes the Promise chain to reject,
                // which means .catch() will fire.
                throw new Error('Error: ' + response.statusText);
            }
        })
        .then(json => console.log(json))
        .catch(err => alert('HTTP Error: ' + err));

    // Test: change /posts to /pots
    //   → Server responds 404 — fetch() resolves, throw fires, .catch() shows alert
    // Test: change domain to jsonph.tipi...
    //   → Network failure — fetch() rejects, .catch() shows alert

    // Note: response.ok is a cleaner shorthand for the status range check above:
    // if (response.ok) { ... } is equivalent to if (status >= 200 && status <= 299)
</script>

</html>
