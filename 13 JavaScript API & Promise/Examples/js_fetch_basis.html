<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fetch basics</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Fetch basics</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    // JSONPlaceholder is a free fake REST API used for testing and prototyping
    const url = 'https://jsonplaceholder.typicode.com/posts';

    // fetch() returns a Promise that resolves with a Response object.
    // The Promise chain handles the async flow step by step.
    fetch(url)
        .then(response => response.json()) // Parse the response body as JSON
        .then(json => console.log(json))   // Log the resulting array of post objects
        .catch(err => alert('HTTP Error (catch): ' + err));
    // .catch() only fires on NETWORK failures (no internet, wrong domain, CORS block).
    // ⚠️ IMPORTANT: fetch() does NOT throw for HTTP error status codes (404, 500 etc).
    // A 404 response still resolves the Promise — the .catch() will NOT fire for it.
    // To catch HTTP errors, you must check response.status or response.ok manually
    // (demonstrated in the fetch status example below).

    // Test this: change /posts to /pots
    //   → The server responds with 404 — fetch() still resolves, .catch() does NOT fire
    // Test this: change the domain to jsonph.tipi...
    //   → Network failure — fetch() rejects, .catch() fires and shows the alert
</script>

</html>
