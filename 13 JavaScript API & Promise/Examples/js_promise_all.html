<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Promise.all()</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Promise.all()</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    // An array of two already-resolved Promises.
    // Promise.resolve() creates a Promise that is immediately fulfilled with the given value.
    const promiseArray = [
        Promise.resolve('Hello, World!'),
        Promise.resolve('Not again :(')
    ];

    // Promise.all() takes an array of Promises and returns a single Promise.
    // It resolves when ALL Promises in the array have resolved.
    // The resolved value is an array of results in the SAME ORDER as the input array —
    // regardless of which Promise resolved first.
    // ⚠️ If ANY Promise rejects, Promise.all() immediately rejects with that error —
    // all other results are discarded (demonstrated in the Promise.race() example).
    const combinedPromise = Promise.all(promiseArray);

    combinedPromise.then(outcomes => {
        // `outcomes` is an array matching the input order
        console.log('This comes first:', outcomes[0]); // → "Hello, World!"
        console.log('This comes second:', outcomes[1]); // → "Not again :("
    });
</script>

</html>
