<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="#">
    <title>Promise basics</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Promise basics</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    let myPromise;
    myPromise = true; // Change to false to trigger the reject path

    const promiseExample = new Promise((resolve, reject) => {
        // Wrapping executor code in try/catch is a defensive pattern.
        // If any synchronous error is thrown inside the executor,
        // the catch block can call reject() instead of leaving the Promise unresolved.
        // Note: in practice, the Promise constructor automatically catches thrown
        // errors and calls reject — so the try/catch here is explicit but not strictly needed.
        try {
            if (myPromise) {
                resolve('I kept my promise!');
            }
            // If myPromise is false, neither resolve nor reject is called here —
            // the Promise stays pending. A better pattern would be an else { reject(...) }.
        } catch (e) {
            // reject('Sorry, I could not keep my promise.');
            reject('Sorry, I could not keep my promise.');
        }
    });

    console.log(promiseExample);
    console.log('My promise was: ' + myPromise);
</script>

</html>
