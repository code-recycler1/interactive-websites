<head>

    <title>Promise basics</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Promise basics</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    // A Promise represents the eventual result of an asynchronous operation.
    // It is in one of three states:
    //   pending   — initial state, neither resolved nor rejected yet
    //   fulfilled — the operation completed successfully (resolve was called)
    //   rejected  — the operation failed (reject was called)

    let myPromise;
    myPromise = false; // Change to true to trigger resolve, false to trigger reject

    // The Promise constructor takes an executor function that runs immediately and synchronously.
    const promiseExample = new Promise((resolve, reject) => {
        // The executor function runs immediately and synchronously.
        // It receives two functions: resolve() to fulfil, reject() to fail.
        if (myPromise) {
            resolve('I kept my promise!');   // Promise moves to fulfilled state
        } else {
            reject('Sorry, I could not keep my promise.'); // Promise moves to rejected state
        }
    });

    // Logging the Promise object shows its current state.
    // If myPromise is false, the rejection is unhandled —
    // the browser console will show "Uncaught (in promise)".
    // Adding .catch() would silence this warning (demonstrated in later examples).
    console.log(promiseExample);
    console.log('My promise was: ' + myPromise);
</script>

</html>
