<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Fetch — POST form data</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h1>Fetch — POST form data</h1>
                <form id="addPostForm">
                    <div class="form-group">
                        <label for="theTitle">Title</label>
                        <input type="text" class="form-control" id="theTitle">
                    </div>
                    <div class="form-group">
                        <label for="theBody">Body</label>
                        <input type="text" class="form-control" id="theBody">
                    </div>
                    <button type="submit" class="btn btn-primary" id="send">Submit</button>
                </form>
            </div>
        </div>
        <div class="row m-2">
            <div class="col-md-12">
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    document.querySelector('#addPostForm').addEventListener('submit', makeFakePost);
    const res = document.querySelector('#divResult');

    // Simulates sending a new post to the JSONPlaceholder API using form values.
    // The API accepts the POST and returns a fake created object — nothing is actually stored.
    function makeFakePost(event) {
        // Prevent the browser's default form submission behaviour (page reload).
        // Without this, the form would navigate away before our fetch completes.
        event.preventDefault();

        const title = document.querySelector('#theTitle').value;
        const body = document.querySelector('#theBody').value;

        // Basic validation — both fields must be filled before sending
        if (title === '' || body === '') {
            res.innerHTML = 'Please fill in all fields.';
            return;
        }

        // Build the data object to send — only the fields the API needs
        const postData = { title, body };

        fetch('https://jsonplaceholder.typicode.com/posts', {
            method: 'POST', // HTTP method — POST creates a new resource

            // JSON.stringify() converts the JS object to a JSON string for the request body.
            // The API expects JSON, not a form submission.
            body: JSON.stringify(postData),

            headers: {
                // Tell the server the body is JSON — required for the API to parse it correctly
                'Content-type': 'application/json; charset=UTF-8'
            }
        })
            .then(response => {
                // fetch() resolves for ALL HTTP responses — including errors like 404 or 500.
                // response.ok is true for status codes 200–299 (success range).
                if (response.ok) {
                    return response.json(); // Parse the success response
                } else {
                    // Reject the Promise manually for HTTP error statuses.
                    // Promise.reject() causes .catch() to fire with the provided object.
                    return Promise.reject({
                        status: response.status,
                        statusText: response.statusText
                    });
                }
            })
            .then(data => console.log(data))             // Log the created post object
            .then(() => res.innerHTML = 'Sent! (see console)')
            .catch(err => res.innerHTML = err.statusText); // Display the HTTP error text

        // Inspect the POST in DevTools: Network tab → POST request → Headers
    }
</script>

</html>
