<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Promise pending</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Promise pending</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    // setTimeout simulates a slow operation — e.g. a network request or file read.
    // The Promise stays in "pending" state until setTimeout fires after 10 seconds.
    const promiseExample = new Promise((resolve, reject) => {
        setTimeout(function () {
            // resolve() is called with an object — any value type is valid
            resolve({
                message: 'I kept my promise after all.',
                code: 'Success!'
            });
        }, 10 * 1000); // 10 000ms = 10 seconds
    });

    // Logging immediately after creation shows Promise {<pending>}
    // because the setTimeout hasn't fired yet.
    // The Promise will move to fulfilled after 10 seconds,
    // but since we have no .then() attached, the resolved value is never used.
    console.log(promiseExample);
</script>

</html>
