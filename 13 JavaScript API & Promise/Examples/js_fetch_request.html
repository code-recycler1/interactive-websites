<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Fetch — POST method</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Fetch — POST method</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    // Simulates creating a new post with hardcoded data — no form needed.
    // JSONPlaceholder accepts the POST and returns a fake response with a new id.
    function makeFakePost() {
        fetch('https://jsonplaceholder.typicode.com/posts', {
            method: 'POST',

            // JSON.stringify() serialises the object into a JSON string for the body.
            // The API ignores unknown fields and returns the object plus an assigned id.
            body: JSON.stringify({
                title: 'My title',
                body: 'Lorem Ipsum is simply dummy text from the printing industry.',
                userId: 99
            }),

            headers: {
                'Content-type': 'application/json; charset=UTF-8'
            }
        })
            .then(response => response.json()) // Parse the API's response
            .then(json => console.log(json));  // Logs the created object — e.g. { id: 101, title: ..., ... }
        // Note: no .catch() here — a minimal example focused on the POST pattern only
    }

    makeFakePost();
</script>

</html>
