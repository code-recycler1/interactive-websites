<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Promise chaining — async tasks</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Promise chaining — async tasks</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    // Simulates a slow async task — squares the input after a random 1–4 second delay.
    // Returns a Promise so it can be chained with .then().
    const doTask = (number) =>
        new Promise(resolve =>
            setTimeout(
                () => resolve(number * number), // squares the number
                randomIntFromInterval(1, 4) * 1000 // random delay between 1–4 seconds
            )
        );

    // CHAIN — each task uses the RESULT of the previous task as its input.
    // Step 1: doTask(2) → resolves with 4 (2²) after random delay
    // Step 2: doTask(4) → resolves with 16 (4²) after random delay
    // Step 3: doTask(16) → resolves with 256 (16²) after random delay
    // Each .then() logs the result and returns a new Promise to continue the chain.
    doTask(2)
        .then(result => {
            console.log('1st task complete. Result:', result); // → 4
            return doTask(result); // pass result into next task
        })
        .then(result => {
            console.log('2nd task complete. Result:', result); // → 16
            return doTask(result);
        })
        .then(result => {
            console.log('3rd task complete. Result:', result); // → 256
        });

    // Helper — generates a random integer between min and max (both inclusive)
    function randomIntFromInterval(min, max) {
        return Math.floor(Math.random() * (max - min + 1) + min);
    }
</script>

</html>
