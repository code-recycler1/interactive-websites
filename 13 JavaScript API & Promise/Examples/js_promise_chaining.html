<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Promise chaining</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Promise chaining</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    const output = document.querySelector('#divResult');

    // CORRECT CHAINING — each .then() returns a value that becomes
    // the input to the next .then(). The chain resolves after 2 seconds.
    // Output appended to the page: 1, 2, 4 (each doubling the previous result)
    const promiseExample = new Promise(function (resolve, reject) {
        setTimeout(() => resolve(1), 2000); // Step (*) — starts with 1 after 2 seconds
    })
        .then(function (result) { // Step (**)
            output.innerHTML += result; // → 1
            return result * 2;          // passes 2 to the next .then()
        })
        .then(function (result) { // Step (***)
            output.innerHTML += result; // → 2
            return result * 2;          // passes 4 to the next .then()
        })
        .then(function (result) {
            output.innerHTML += result; // → 4
            return result * 2;          // return value is ignored — no more .then() steps
        });


    // ⚠️ WRONG PATTERN (commented out) — this is NOT chaining.
    // Attaching multiple .then() to the SAME Promise object means each handler
    // receives the ORIGINAL resolved value (1) — not the result of the previous handler.
    // All three would print 1, not 1, 2, 4.
    /*
    const promiseExample = new Promise(function(resolve, reject) {
        setTimeout(() => resolve(1), 2000);
    });

    promiseExample.then(result => { output.innerHTML += result; return result * 2; }); // → 1
    promiseExample.then(result => { output.innerHTML += result; return result * 2; }); // → 1
    promiseExample.then(result => { output.innerHTML += result; return result * 2; }); // → 1
    */
</script>

</html>
