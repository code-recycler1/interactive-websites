    <title>Promise — async/await</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Promise — async/await</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    // `async` marks a function as asynchronous.
    // It always returns a Promise — even if you return a plain value,
    // it gets wrapped in Promise.resolve() automatically.
    async function test() {

        // Create a Promise that resolves with "Done!" after 1 second
        const promise = new Promise((resolve, reject) => {
            setTimeout(() => resolve('Done!'), 1000);
        });

        // `await` pauses execution of this async function until the Promise settles.
        // Code OUTSIDE this async function continues running — await only pauses THIS function.
        // Once the Promise resolves, `result` holds the resolved value.
        const result = await promise;

        // These two lines run sequentially AFTER the Promise resolves —
        // `await` ensures the order is guaranteed despite the async delay.
        console.log(result);           // → "Done!"
        console.log('I am done too!'); // → runs immediately after, not after another delay
    }

    test();
</script>

</html>
