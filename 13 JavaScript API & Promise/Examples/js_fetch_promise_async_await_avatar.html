<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Fetch — async/await</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Fetch — async/await</h1>
                <div class="row" id="divResult"></div>
            </div>
        </div>
    </div>
</body>

<script>
    // `async` marks a function as asynchronous — it always returns a Promise.
    // Inside an async function, `await` pauses execution until the awaited
    // Promise resolves, making asynchronous code read like synchronous code.
    async function showAvatar() {

        // Step 1 — read a local JSON file containing a GitHub username.
        // `await` pauses here until the fetch completes and the response arrives.
        const response = await fetch('files/user_git.json');

        // Step 2 — parse the response body as JSON.
        // `await` pauses again until the body is fully read and parsed.
        const user = await response.json();

        // Step 3 — use the username from the local file to query the GitHub API.
        // Two separate awaits for the request and the body parse.
        const githubResponse = await fetch(`https://api.github.com/users/${user.name}`);
        const githubUser = await githubResponse.json();

        // Step 4 — create an <img> element and set its src to the GitHub avatar URL
        const img = document.createElement('img');
        img.src = githubUser.avatar_url;
        img.className = 'promise-avatar-example';
        document.body.append(img);

        // Step 5 — wait 3 seconds before removing the image.
        // `new Promise` with setTimeout wraps a non-Promise API in a Promise
        // so it can be awaited. `resolve` is called after 3000ms.
        await new Promise(resolve => setTimeout(resolve, 3000));

        img.remove();

        // The function returns the GitHub user object —
        // since this is an async function, the return value is wrapped in a Promise
        return githubUser;
    }

    // Calling an async function returns a Promise immediately.
    // The console will show Promise {<pending>} — the function is still running.
    console.log(showAvatar());
</script>

</html>
