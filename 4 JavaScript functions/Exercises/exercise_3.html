<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript functions - Exercise 3</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
        integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <!-- Optional: Add custom styles for better UX -->
    <style>
        .form-text {
            margin-top: 10px;
            width: 100%;
            max-width: 300px;
        }

        #txtResult {
            transition: all 0.3s ease;
        }

        #txtResult:focus {
            border-color: #80bdff;
            outline: 0;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row p-4">
            <div class="col-md-12">

                <!-- FORM: Name Entry Form  -->
                <form id="nameForm">
                    <!-- BUTTON: Name Entry Trigger -->
                    <button type="button" class="btn btn-primary" id="btnEnterName">
                        Enter Name
                    </button>

                    <!-- TEXT FIELD: Display entered name -->
                    <input type="text" id="txtResult" name="txtResult" class="form-control form-text mt-2"
                        placeholder="Name will appear here..." readonly>

                    <div id="feedbackMessage" class="mt-2 small text-muted"></div>
                </form>

            </div>
        </div>
    </div>

    <script>
        // Get references to DOM elements
        const nameInputField = document.getElementById('txtResult');
        const enterNameButton = document.getElementById('btnEnterName');
        const feedbackDiv = document.getElementById('feedbackMessage');

        // ----- FUNCTION: ENTER NAME -----
        // Prompts the user for a name and displays it in the text field
        function enterName(inputElement) {
            // Validate that we have a valid input element
            if (!inputElement) {
                console.error('Invalid input element provided');
                return false;
            }

            // Display prompt dialog asking for name
            let name = prompt("Please enter your name:", "");

            // ----- INPUT VALIDATION -----
            // Handle user cancellation (prompt returns null)
            if (name === null) {
                // User clicked Cancel
                if (feedbackDiv) {
                    feedbackDiv.innerHTML = '<span class="text-warning">Name entry cancelled.</span>';
                }
                return false;
            }

            // Trim whitespace from input
            name = name.trim();

            // Check if name is empty after trimming
            if (name === "") {
                if (feedbackDiv) {
                    feedbackDiv.innerHTML = '<span class="text-danger">Please enter a valid name (cannot be empty).</span>';
                }
                return false;
            }

            // Capitalize first letter of each word
            const capitalizedName = name.split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
                .join(' ');

            // Display the name in the text field
            inputElement.value = capitalizedName;

            // Provide success feedback
            if (feedbackDiv) {
                feedbackDiv.innerHTML = '<span class="text-success">Name successfully saved!</span>';
            }

            return true;
        }

        // ----- EVENT LISTENER: Button Click -----        
        if (enterNameButton && nameInputField) {
            // Add click event listener to the button
            enterNameButton.addEventListener('click', function () {
                enterName(nameInputField);
            });

            // ----- EVENT LISTENER: Keyboard Accessibility (Enter key on text field) -----
            nameInputField.addEventListener('keypress', function (event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    enterName(nameInputField);
                }
            });
        } else {
            console.error('Required DOM elements not found');
        }
    </script>
</body>

</html>
