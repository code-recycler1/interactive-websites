<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passing parameters 1</title>
</head>

<body>
    <div id="divResult"></div>

    <script>
        // FUNCTION DECLARATION
        // Takes two parameters and returns their sum.
        // This is a pure function — it only depends on its inputs,
        // modifies nothing outside itself, and always returns the same
        // output for the same inputs.
        function addUp(a, b) {
            return a + b; // The result of a + b is immediately returned to the caller
        }

        // Call the function with 2 and 3 as arguments.
        // The returned value (5) is stored in `result`.
        let result = addUp(2, 3);

        // Display the result by writing it into the DOM.
        document.getElementById("divResult").textContent = result;
    </script>

</body>

</html>
