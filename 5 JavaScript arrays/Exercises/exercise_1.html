<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript arrays - Exercise 1</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .result-card {
            max-height: 600px;
            overflow-y: auto;
        }

        .step-badge {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-right: 0.75rem;
        }

        .add-name-section {
            background-color: #f8f9fa;
            border-radius: 0.5rem;
            padding: 0.75rem;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-5">
        <!-- Results Card -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <i class="bi bi-file-text me-2"></i>Results
                    </div>
                    <div class="card-body result-card" id="resultaat">
                        <div class="text-center text-secondary py-4">
                            <i class="bi bi-hourglass-split fs-1"></i>
                            <p class="mt-2">Loading results...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Reset Button -->
        <div class="row mt-4">
            <div class="col-12 text-center">
                <button id="resetBtn" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-repeat me-2"></i>Reset
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Initial array (5 names)
        let classmates = ['Ben', 'Mitchel', 'Cindy', 'Eva', 'Dave'];
        classmates.sort();

        const resultElement = document.getElementById('resultaat');

        function addResult(stepNumber, title, content, icon = 'bi-info-circle') {
            const stepDiv = document.createElement('div');
            stepDiv.className = 'mb-3 p-3 border rounded bg-light';
            stepDiv.innerHTML = `
                <div class="d-flex align-items-start">
                    <div class="step-badge bg-primary text-white flex-shrink-0">${stepNumber}</div>
                    <div class="flex-grow-1">
                        <h6 class="mb-2 text-primary"><i class="${icon} me-1"></i>${title}</h6>
                        <div class="font-monospace small bg-dark text-light p-2 rounded">${content}</div>
                    </div>
                </div>
            `;
            resultElement.appendChild(stepDiv);
        }

        function displayResults() {
            resultElement.innerHTML = '';

            // Step 1: Array length
            addResult(1, 'Array Length',
                `<code>classmates.length</code> = ${classmates.length}<br>
                 <span class="text-secondary">The array contains ${classmates.length} names.</span>`, 'bi-123');

            // Step 2: First, third, and fifth elements
            addResult(2, 'Specific Elements',
                `<code>classmates[0]</code> (1st): ${classmates[0]}<br>
                 <code>classmates[2]</code> (3rd): ${classmates[2]}<br>
                 <code>classmates[4]</code> (5th): ${classmates[4] || '(not available)'}`, 'bi-pin');

            // Step 3: Sorted array
            addResult(3, 'Sorted Alphabetically',
                `<strong>Sorted array:</strong> [${classmates.join(', ')}]`, 'bi-sort-alpha-down');

            // Step 4: Add new name
            addResult(4, 'Add New Name',
                `<div class="add-name-section text-center">
                    <button id="addNameBtn" class="btn btn-primary">
                        <i class="bi bi-person-plus me-2"></i>Add New Name
                    </button>
                    <div class="mt-2 small text-secondary">
                        Current: [${classmates.join(', ')}]
                    </div>
                </div>`, 'bi-person-plus');

            // Step 5: Join array to string
            addResult(5, 'Join Array to String',
                `<code>classmates.join(', ')</code> → "${classmates.join(', ')}"`, 'bi-link');

            // Re-attach event listener
            document.getElementById('addNameBtn')?.addEventListener('click', addNewName);
        }

        function addNewName() {
            let newName = prompt("Enter a name to add to the array:", "");
            if (!newName?.trim()) return;

            newName = newName.trim();
            newName = newName.charAt(0).toUpperCase() + newName.slice(1).toLowerCase();

            classmates.push(newName);
            classmates.sort();
            displayResults();
        }

        function resetDemo() {
            classmates = ['Ben', 'Mitchel', 'Cindy', 'Eva', 'Dave'];
            classmates.sort();
            displayResults();
        }

        // Initialize
        displayResults();
        document.getElementById('resetBtn')?.addEventListener('click', resetDemo);

        console.log('Initial array:', classmates);
    </script>
</body>

</html>
