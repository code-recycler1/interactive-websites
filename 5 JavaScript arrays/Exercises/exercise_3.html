<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript arrays - Exercise 3</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .score-badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
            min-width: 80px;
        }

        .score-original {
            background-color: #e9ecef;
            color: #495057;
        }

        /* Visual indicators for converted scores */
        .score-excellent {
            background-color: #198754;
            color: white;
        }

        .score-good {
            background-color: #20c997;
            color: white;
        }

        .score-average {
            background-color: #ffc107;
            color: #212529;
        }

        .score-low {
            background-color: #dc3545;
            color: white;
        }

        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 1rem;
        }

        .legend {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #dee2e6;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 0.25rem;
        }
    </style>
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row mb-4">
            <div class="col-12 text-center">
                <button id="generateBtn" class="btn btn-primary btn-lg">
                    <i class="bi bi-shuffle me-2"></i>Generate New Random Scores
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white">
                        <i class="bi bi-code-square me-2"></i>Results
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <strong><i class="bi bi-database me-2"></i>Original Scores (0-100):</strong>
                                <div id="originalScores" class="mt-3 score-grid"></div>
                            </div>
                            <div class="col-md-6">
                                <strong><i class="bi bi-arrow-left-right me-2"></i>Converted Scores (0-20):</strong>
                                <div id="convertedScores" class="mt-3 score-grid"></div>
                            </div>
                        </div>

                        <!-- Legend -->
                        <div class="legend">
                            <div class="legend-item">
                                <div class="legend-color" style="background-color: #198754;"></div>
                                <span>18-20: Excellent</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color" style="background-color: #20c997;"></div>
                                <span>15-17: Good</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color" style="background-color: #ffc107;"></div>
                                <span>10-14: Average</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-color" style="background-color: #dc3545;"></div>
                                <span>0-9: Low</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Generate 10 random scores between 40 and 100
        function generateScores() {
            return Array.from({ length: 10 }, () => Math.floor(Math.random() * 61) + 40);
        }

        // Convert 100-scale to 20-scale (divide by 5, round to integer)
        const convertScore = score => Math.round(score / 5);

        // Get CSS class based on score value
        function getScoreClass(score) {
            if (score >= 18) return 'score-excellent';
            if (score >= 15) return 'score-good';
            if (score >= 10) return 'score-average';
            return 'score-low';
        }

        // Display scores
        function displayScores(scores) {
            const converted = scores.map(convertScore);

            document.getElementById('originalScores').innerHTML = scores
                .map(s => `<div class="score-badge score-original">${s}/100</div>`).join('');

            document.getElementById('convertedScores').innerHTML = converted
                .map(s => `<div class="score-badge ${getScoreClass(s)}">${s}/20</div>`).join('');

            console.log('Original:', scores);
            console.log('Converted:', converted);
        }

        // Initialize
        let currentScores = generateScores();
        displayScores(currentScores);

        // Event listener
        document.getElementById('generateBtn').addEventListener('click', () => {
            currentScores = generateScores();
            displayScores(currentScores);
        });
    </script>
</body>

</html>
