<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript arrays - Exercise 4</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">
    <div class="container py-5">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-success text-white">
                        <i class="bi bi-carrot-fill me-2"></i>Vegetables (for loop - bounded)
                    </div>
                    <div class="card-body">
                        <div id="vegetablesOutput" class="font-monospace"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-danger text-white">
                        <i class="bi bi-apple me-2"></i>Fruits (while loop - conditional)
                    </div>
                    <div class="card-body">
                        <div id="fruitsOutput" class="font-monospace"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-3">
            <div class="col-12">
                <div class="alert alert-secondary">
                    <i class="bi bi-info-circle me-2"></i>
                    <strong>Console Output:</strong> Open the browser console (F12) to see the logged values.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Arrays with 5 items each
        const vegetables = ["Cucumber", "Lettuce", "Cauliflower", "Broccoli", "Spinach"];
        const fruits = ["Apple", "Banana", "Orange", "Strawberry", "Grapes"];

        // Display in DOM
        document.getElementById('vegetablesOutput').innerHTML = vegetables
            .map(v => `<div><i class="bi bi-caret-right-fill text-success me-2"></i>${v}</div>`)
            .join('');

        document.getElementById('fruitsOutput').innerHTML = fruits
            .map(f => `<div><i class="bi bi-caret-right-fill text-danger me-2"></i>${f}</div>`)
            .join('');

        // Bounded loop (for) - vegetables
        console.log('=== VEGETABLES (for loop) ===');
        for (let i = 0; i < vegetables.length; i++) {
            console.log(vegetables[i]);
        }

        // Conditional loop (while) - fruits
        console.log('\n=== FRUITS (while loop) ===');
        let i = 0;
        while (i < fruits.length) {
            console.log(fruits[i]);
            i++;
        }
    </script>
</body>

</html>
