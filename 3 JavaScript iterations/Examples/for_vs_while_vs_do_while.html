<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For, While, and Do-While loops</title>
</head>

<body>
    <main class="container">
        <h1>For, While, and Do-While loops</h1>

        <h2>Normal case — start (1) is within range (≤ 10):</h2>
        <div>
            <h3>For loop:</h3>
            <div id="normalFor"></div>
            <h3>While loop:</h3>
            <div id="normalWhile"></div>
            <h3>Do-While loop:</h3>
            <div id="normalDoWhile"></div>
        </div>

        <h2>Edge case — start (99) is already outside range (≤ 10):</h2>
        <p>This is where while and do-while behave differently.</p>
        <div>
            <h3>For loop: <span id="edgeFor"></span></h3>
            <h3>While loop: <span id="edgeWhile"></span></h3>
            <h3>Do-While loop: <span id="edgeDoWhile"></span></h3>
        </div>
    </main>

    <script>
        // --- HELPER FUNCTION ---
        // Builds a comma-separated number sequence using each loop type.
        // Wrapping each loop in a function keeps variables scoped and isolated —
        // no shared mutable state, no resets, no shadowing issues.

        function runForLoop(from, to) {
            let txt = '';
            for (let i = from; i <= to; i++) {
                txt += (txt === '') ? i : ', ' + i;
            }
            // If nothing was added, show a clear message instead of blank output
            return txt || '(loop body never executed)';
        }

        function runWhileLoop(from, to) {
            let txt = '';
            let i = from;
            while (i <= to) {
                txt += (txt === '') ? i : ', ' + i;
                i++;
            }
            return txt || '(loop body never executed)';
        }

        function runDoWhileLoop(from, to) {
            let txt = '';
            let i = from;
            do {
                // This block runs BEFORE the condition is ever checked.
                // Even if `from` is already greater than `to`, this executes once.
                txt += (txt === '') ? i : ', ' + i;
                i++;
            } while (i <= to);
            return txt;
        }

        // --- NORMAL CASE: start within range ---
        // All three loops behave identically here — that's expected.
        document.getElementById('normalFor').innerHTML = runForLoop(1, 10);
        document.getElementById('normalWhile').innerHTML = runWhileLoop(1, 10);
        document.getElementById('normalDoWhile').innerHTML = runDoWhileLoop(1, 10);

        // --- EDGE CASE: start already outside range ---
        // for and while:    condition is false immediately → body never runs → empty
        // do-while:         body runs once BEFORE checking → prints 99, then stops
        document.getElementById('edgeFor').innerHTML = runForLoop(99, 10);
        document.getElementById('edgeWhile').innerHTML = runWhileLoop(99, 10);
        document.getElementById('edgeDoWhile').innerHTML = runDoWhileLoop(99, 10);
    </script>
</body>

</html>
