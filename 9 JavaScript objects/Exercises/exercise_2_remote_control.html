<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript objects - Exercise 2</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
</head>

<body>
    <div class="container">
        <h1>Remote Control</h1>
        <div class="row">
            <div class="col-md-12">
                <form action="" method="POST" id="form1" name="form1">
                    <table width="75%" class="table table-bordered">
                        <tr>
                            <td>Device</td>
                            <td>Volume</td>
                            <td>Channel</td>
                        </tr>
                        <tr>
                            <!-- Radio button values MUST match the object variable names exactly.
                                 eval() constructs strings like "tv.volume++" — the value is the object name. -->
                            <td><input type="radio" name="rbDevice" value="tv" checked>&nbsp;TV</td>
                            <!-- readonly prevents direct editing — values are set by JavaScript only -->
                            <td><input type="text" id="txtTvVolume" name="txtTvVolume" size="3" class="form-control"
                                    readonly></td>
                            <td><input type="text" id="txtTvChannel" name="txtTvChannel" size="3" class="form-control"
                                    readonly></td>
                        </tr>
                        <tr>
                            <td><input type="radio" name="rbDevice" value="stereo">&nbsp;Stereo</td>
                            <td><input type="text" id="txtStereoVolume" name="txtStereoVolume" size="3"
                                    class="form-control" readonly></td>
                            <td><input type="text" id="txtStereoChannel" name="txtStereoChannel" size="3"
                                    class="form-control" readonly></td>
                        </tr>
                        <tr>
                            <td><input type="radio" name="rbDevice" value="pc">&nbsp;PC</td>
                            <td><input type="text" id="txtPcVolume" name="txtPcVolume" size="3" class="form-control"
                                    readonly></td>
                            <td><input type="text" id="txtPcChannel" name="txtPcChannel" size="3" class="form-control"
                                    readonly></td>
                        </tr>
                        <tr>
                            <td>Volume:</td>
                            <td colspan="2">
                                <input type="button" value="Increase" id="btnVolumePlus" class="btn btn-success">
                                <input type="button" value="Decrease" id="btnVolumeMin" class="btn btn-warning">
                            </td>
                        </tr>
                        <tr>
                            <td>Channel:</td>
                            <td colspan="2">
                                <!-- Text field for entering the desired channel number -->
                                <input type="number" id="txtChannel" name="txtChannel" class="form-control" size="3">
                                <input type="button" value="Change" id="btnChannel" class="btn btn-primary mt-2">
                            </td>
                        </tr>
                    </table>
                </form>
            </div>
        </div>
    </div>

    <script>
        // --- OBJECT CONSTRUCTOR FUNCTION ---
        // Blueprint for a device — each instance gets its own volume and channel.
        // Named with a capital letter by convention (marks it as a constructor).
        function Device(volume, channel) {
            this.volume = volume;
            this.channel = channel;
        }

        // --- CREATE THREE DEVICE INSTANCES ---
        // Variable names MUST match the radio button values ('tv', 'stereo', 'pc').
        // eval() builds strings using those values e.g. "tv.volume++" — if the
        // names don't match, eval() will throw a ReferenceError.
        let tv = new Device(0, 0);
        let stereo = new Device(0, 0);
        let pc = new Device(0, 0);

        // --- CACHE ELEMENTS ---
        // querySelectorAll with a comma selector returns both volume buttons at once
        const volumeButtons = document.querySelectorAll('#btnVolumePlus, #btnVolumeMin');
        const channelButton = document.querySelector('#btnChannel');

        // --- EVENT LISTENERS ---
        // Populate all fields with initial values (0) as soon as the page loads
        window.addEventListener('load', () => setValues());

        // Attach changeVolume to both volume buttons.
        // `this` inside changeVolume will refer to the button that was clicked,
        // allowing us to check this.id to determine increase vs decrease.
        volumeButtons.forEach(button => {
            button.addEventListener('click', changeVolume);
        });

        channelButton.addEventListener('click', changeChannel);

        // --- setValues() ---
        // Reads the current volume and channel from each device object
        // and writes them into the corresponding read-only text fields.
        // Called on load and after every change to keep the UI in sync.
        function setValues() {
            // Legacy form element access via name attribute — works but querySelector is preferred.
            // Kept here because the exercise uses form1.fieldName throughout.
            form1.txtTvVolume.value = tv.volume;
            form1.txtTvChannel.value = tv.channel;
            form1.txtStereoVolume.value = stereo.volume;
            form1.txtStereoChannel.value = stereo.channel;
            form1.txtPcVolume.value = pc.volume;
            form1.txtPcChannel.value = pc.channel;
        }

        // --- changeVolume() ---
        // Called by both volume buttons. Uses `this.id` to determine direction.
        // Loops through all radio buttons to find which device is selected,
        // then uses eval() to increment or decrement that device's volume.
        function changeVolume() {
            // form1.rbDevice is a RadioNodeList of all radio buttons with that name
            for (let i = 0; i < form1.rbDevice.length; i++) {
                if (form1.rbDevice[i].checked) {
                    // form1.rbDevice[i].value is 'tv', 'stereo', or 'pc' —
                    // these match the variable names declared above.
                    // eval() constructs and executes e.g. "tv.volume++" or "tv.volume--"
                    // ⚠️ eval() is used here as required by the exercise.
                    // In production, use a lookup object instead (see note below).
                    if (this.id === 'btnVolumePlus') {
                        eval(form1.rbDevice[i].value + '.volume++');
                    } else {
                        eval(form1.rbDevice[i].value + '.volume--');
                    }
                }
            }
            setValues(); // Refresh all fields after the change
        }

        // --- changeChannel() ---
        // Same pattern as changeVolume() — finds the selected radio button,
        // then uses eval() to set the channel property to the entered value.
        function changeChannel() {
            for (let i = 0; i < form1.rbDevice.length; i++) {
                if (form1.rbDevice[i].checked) {
                    // Constructs e.g. "tv.channel='5'" and executes it
                    eval(form1.rbDevice[i].value + ".channel='" + form1.txtChannel.value + "'");
                }
            }
            setValues(); // Refresh all fields after the change
        }
    </script>
</body>

</html>
