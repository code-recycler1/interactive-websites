<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript objects - Exercise 2</title>
    <!-- Add Bootstrap -->

    <link rel="shortcut icon" href="#">
</head>

<body>
    <div class="container">
        <h1>Remote Control</h1>
        <div class="row">
            <div class="col-md-12">
                <form action="" method="POST" id="form1" name="form1">
                    <table width="75%" class="table table-bordered">
                        <tr>
                            <td>Device</td>
                            <td>Volume</td>
                            <td>Channel</td>
                        </tr>
                        <tr>
                            <td><input type="radio" name="rbDevice" value="tv" checked>&nbsp;TV</td>
                            <td><input type="text" id="txtTvVolume" name="txtTvVolume" class="form-control" size="3"
                                    readonly></td>
                            <td><input type="text" id="txtTvChannel" name="txtTvChannel" class="form-control" size="3"
                                    readonly></td>
                        </tr>
                        <tr>
                            <td><input type="radio" name="rbDevice" value="stereo">&nbsp;Stereo</td>
                            <td><input type="text" id="txtStereoVolume" name="txtStereoVolume" class="form-control"
                                    size="3" readonly></td>
                            <td><input type="text" id="txtStereoChannel" name="txtStereoChannel" class="form-control"
                                    size="3" readonly></td>
                        </tr>
                        <tr>
                            <td><input type="radio" name="rbDevice" value="pc">&nbsp;PC</td>
                            <td><input type="text" id="txtPcVolume" name="txtPcVolume" class="form-control" size="3"
                                    readonly></td>
                            <td><input type="text" id="txtPcChannel" name="txtPcChannel" class="form-control" size="3"
                                    readonly></td>
                        </tr>
                        <tr>
                            <td>Volume:</td>
                            <td colspan="2">
                                <input type="button" value="Increase" id="btnVolumePlus" class="btn btn-success">
                                <input type="button" value="Decrease" id="btnVolumeMin" class="btn btn-warning">
                            </td>
                        </tr>
                        <tr>
                            <td>Channel:</td>
                            <td colspan="2">
                                <input type="number" id="txtChannel" name="txtChannel" class="form-control" size="3">
                                <input type="button" value="Change" id="btnChannel" class="btn btn-primary mt-2">
                            </td>
                        </tr>
                    </table>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Write your code below.

    </script>
</body>

</html>
