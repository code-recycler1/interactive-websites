<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3 - Array of User Objects: map, filter, reduce</title>
    <!-- Bootstrap 5 CSS for optional styling (light background and container) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="#">
</head>

<body>
    <div class="container">
        <div class="bg-dark text-white p-4 mt-4 rounded font-monospace">
            <strong>📢 Console output:</strong><br>
            Check the console (F12) for the results of map, filter, reduce.
        </div>
    </div>

    <script>
        // ============================================================
        // STEP 1: Create an array with 7 user objects
        // ============================================================
        // Each object has one property: 'user' (name of the person).
        // Using const because the array reference will not change.
        const arrUsers = [
            { user: "John" },
            { user: "Jane" },
            { user: "Rose" },
            { user: "Jack" },
            { user: "Louis" },
            { user: "Emma" },
            { user: "Patrick" }
        ];

        // ============================================================
        // STEP 2: Use map() to add a random 'points' property to each object
        // ============================================================
        // The map() method iterates over each object and adds the points property.
        // Note: map() returns a new array, but we are mutating the original objects.
        // This is acceptable because the exercise asks to "give each object a new property".
        arrUsers.map(user => {
            // Generate random integer between 0 and 100 (inclusive)
            const points = Math.round(Math.random() * 100);
            // Add the property directly to the existing object
            user.points = points;
            // Return the object (required by map, though we don't use the result)
            return user;
        });

        // Display the entire array with the added points in the console
        console.log('=== All users with random points ===');
        console.log(arrUsers);

        // ============================================================
        // STEP 3: Use filter() to select users with points > 50
        // ============================================================
        // filter() creates a new array containing only the objects that pass the test.
        const arrSelected = arrUsers.filter(user => user.points > 50);

        // Display the filtered array
        console.log('\n=== Users with points > 50 ===');
        console.log(arrSelected);

        // ============================================================
        // STEP 4: Use reduce() to calculate the sum of points of selected users
        // ============================================================
        // If arrSelected is empty, we set sum = 0 and avoid division by zero.
        let averageMessage = '';
        if (arrSelected.length === 0) {
            averageMessage = 'No users have points greater than 50. Average cannot be calculated.';
        } else {
            // reduce() accumulates the sum of the 'points' property
            const totalPoints = arrSelected.reduce((accumulator, currentUser) => {
                return accumulator + currentUser.points;
            }, 0); // start accumulator at 0

            const average = totalPoints / arrSelected.length;

            // Round to two decimal places for readability
            const roundedAverage = Math.round(average * 100) / 100;
            averageMessage = `The average points of users with >50 points is: ${roundedAverage} (based on ${arrSelected.length} users, total points: ${totalPoints})`;
        }

        // Display the average in the console
        console.log('\n=== Average points (users > 50) ===');
        console.log(averageMessage);
    </script>
</body>

</html>
