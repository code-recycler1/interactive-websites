<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onkeyup 2</title>
</head>

<body>
    <input type="text" id="myInput">
    <p id="result"></p>

    <script>
        // Cache both elements once — reused in the handler
        const myInput = document.getElementById('myInput');
        const result = document.getElementById('result');

        // 'keyup' fires AFTER the character has been added to the input field.
        // This means .value always reflects the fully updated content —
        // the opposite of 'keydown' which fires before the character is added.
        myInput.addEventListener('keyup', myFunction);

        function myFunction() {
            // Reads the input value after the key has been released —
            // the character that was just typed IS included in this value
            result.innerHTML = myInput.value;
        }
    </script>
</body>

</html>
