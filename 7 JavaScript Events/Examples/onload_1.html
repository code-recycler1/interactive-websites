<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onload 1</title>
</head>

<!-- Inline onload attribute -->

<body id="pageBody" onload="myFunction()">
    <div id="status"></div>

    <script>
        function myFunction() {
            document.getElementById('status').innerHTML = 'The page has loaded.';
        }
    </script>
</body>

</html>
