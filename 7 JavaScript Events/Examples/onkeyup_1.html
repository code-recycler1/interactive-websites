<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>onkeyup 1</title>
</head>

<body>
    <!-- Inline onkeyup attribute -->
    <input type="text" id="myInput" onkeyup="myFunction()">
    <p id="result"></p>

    <script>
        // Cache both elements once — reused in the handler
        const myInput = document.getElementById('myInput');
        const result = document.getElementById('result');

        function myFunction() {
            // Reads the input value after the key has been released —
            // the character that was just typed IS included in this value
            result.innerHTML = myInput.value;
        }
    </script>
</body>

</html>
