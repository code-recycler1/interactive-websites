<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alert 1</title>
</head>

<body>
    <button onclick="showAlert();">Push me</button>
    <script>
        // alert() is a built-in browser dialog that displays a message
        // and blocks all page interaction until the user clicks OK.
        // It is useful for simple demonstrations but not appropriate
        // for production use — it cannot be styled, blocks the main thread,
        // and can be suppressed by the browser if called repeatedly.
        function showAlert() {
            alert('Hello world!');
        }
    </script>
</body>

</html>
