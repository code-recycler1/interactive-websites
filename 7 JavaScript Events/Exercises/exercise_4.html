<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS — provides all layout, card, form, and table styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <title>JavaScript events - Exercise 4</title>
</head>

<body>
    <!-- NAVBAR — Bootstrap responsive navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <!-- Brand logo/name — links to the top of the page -->
            <a class="navbar-brand" href="#">IW</a>

            <!-- Hamburger toggle button — only visible on small screens.
                         Collapses/expands the nav links on mobile. -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapsible nav links — hidden on mobile, shown on larger screens -->
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <!-- External link to W3Schools JavaScript reference -->
                    <li class="nav-item">
                        <a class="nav-link" target="_blank" href="https://www.w3schools.com/js/DEFAULT.asp">W3Schools
                            JS</a>
                    </li>
                    <!-- External link to MDN JavaScript documentation -->
                    <li class="nav-item">
                        <a class="nav-link" target="_blank"
                            href="https://developer.mozilla.org/en-US/docs/Web/JavaScript">MDN JS docs</a>
                    </li>
                    <!-- Dropdown menu with specific Stack Overflow and reference links -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownMenuLink" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">Specific</a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                            <li><a class="dropdown-item" target="_blank"
                                    href="https://stackoverflow.com/questions/20673959/how-to-add-new-li-to-ul-onclick-with-javascript/20673977">Stack
                                    #1</a></li>
                            <li><a class="dropdown-item" target="_blank"
                                    href="https://stackoverflow.com/questions/10750137/remove-all-li-from-ul">Stack
                                    #2</a></li>
                            <li><a class="dropdown-item" target="_blank"
                                    href="https://tecadmin.net/get-current-date-time-javascript/">Date & Time</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT — Bootstrap grid layout -->
    <main class="container">
        <div class="row">
            <div class="col">
                <h1>JavaScript events - Exercise 4</h1>
            </div>
        </div>
        <div class="row">
            <!-- LEFT COLUMN — input form -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Form</div>
                    <div class="card-body">
                        <form>
                            <!-- First name field — updates the full name display on every keystroke -->
                            <div class="mb-3">
                                <label for="firstName" class="form-label">First name</label>
                                <input type="text" class="form-control" id="firstName">
                            </div>

                            <!-- Last name field — also updates the full name display on every keystroke -->
                            <div class="mb-3">
                                <label for="lastName" class="form-label">Last name</label>
                                <input type="text" class="form-control" id="lastName">
                            </div>

                            <!-- Colour dropdown — updates the favourite colour display on change -->
                            <div class="mb-3">
                                <label for="colour" class="form-label">Favourite colour</label>
                                <select class="form-select" id="colour">
                                    <option selected value="">Choose a colour</option>
                                    <option value="Green">Green</option>
                                    <option value="Blue">Blue</option>
                                    <option value="Red">Red</option>
                                </select>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN — live results table -->
            <!-- Updates in real time as the user types or selects -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">Result</div>
                    <div class="card-body">
                        <table class="table table-borderless">
                            <tr>
                                <th>Full name</th>
                                <!-- Updated by updateName() on every keystroke in either name field -->
                                <td id="fullName"></td>
                            </tr>
                            <tr>
                                <th>Favourite colour</th>
                                <!-- Updated by updateColour() when the dropdown selection changes -->
                                <td id="favouriteColour"></td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Cache all form inputs and result cells once
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const colourSelect = document.getElementById('colour');
        const fullNameCell = document.getElementById('fullName');
        const favouriteColourCell = document.getElementById('favouriteColour');

        // Both name fields share the same handler — either field updating
        // triggers a full name recombination.
        firstNameInput.addEventListener('keyup', updateName);
        lastNameInput.addEventListener('keyup', updateName);
        colourSelect.addEventListener('change', updateColour);

        // Reads both name fields and combines them into a full name.
        // 'keyup' fires after each keystroke so the result updates in real time.
        // trim() removes accidental leading/trailing spaces from either field.
        function updateName() {
            const first = firstNameInput.value.trim();
            const last = lastNameInput.value.trim();

            // If both fields have content, combine with a space.
            // If only one has content, show that alone — no leading or trailing space.
            fullNameCell.textContent = [first, last].filter(Boolean).join(' ');
        }

        // Reads the selected colour option and displays it in the result table.
        // 'change' fires when the user selects a different option from the dropdown.
        function updateColour() {
            const selected = colourSelect.value;

            // Only display a value if the user has moved past the placeholder option
            favouriteColourCell.textContent = selected !== '' ? selected : '';
        }
    </script>

    <!-- Bootstrap JS bundle — required for navbar toggler and dropdown -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW"
        crossorigin="anonymous"></script>
</body>

</html>
