<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS — provides all layout, card, button, and list styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <title>JavaScript events - Exercise 5</title>
</head>

<body>
    <!-- NAVBAR — Bootstrap responsive navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <!-- Brand logo/name — links to the top of the page -->
            <a class="navbar-brand" href="#">IW</a>

            <!-- Hamburger toggle button — only visible on small screens.
                             Collapses/expands the nav links on mobile. -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapsible nav links — hidden on mobile, shown on larger screens -->
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <!-- External link to W3Schools JavaScript reference -->
                    <li class="nav-item">
                        <a class="nav-link" target="_blank" href="https://www.w3schools.com/js/DEFAULT.asp">W3Schools
                            JS</a>
                    </li>
                    <!-- External link to MDN JavaScript documentation -->
                    <li class="nav-item">
                        <a class="nav-link" target="_blank"
                            href="https://developer.mozilla.org/en-US/docs/Web/JavaScript">MDN JS docs</a>
                    </li>
                    <!-- Dropdown menu with specific Stack Overflow and reference links -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownMenuLink" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">Specific</a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                            <li><a class="dropdown-item" target="_blank"
                                    href="https://stackoverflow.com/questions/20673959/how-to-add-new-li-to-ul-onclick-with-javascript/20673977">Stack
                                    #1</a></li>
                            <li><a class="dropdown-item" target="_blank"
                                    href="https://stackoverflow.com/questions/10750137/remove-all-li-from-ul">Stack
                                    #2</a></li>
                            <li><a class="dropdown-item" target="_blank"
                                    href="https://tecadmin.net/get-current-date-time-javascript/">Date & Time</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT — Bootstrap grid layout -->
    <main class="container">
        <div class="row">
            <div class="col">
                <h1>JavaScript events - Exercise 5</h1>
            </div>
        </div>
        <div class="row">
            <!-- LEFT COLUMN — colour buttons.
                 Each button passes its colour name as an argument to addColor().
                 Bootstrap button classes (btn-primary, btn-danger etc.) give each
                 button a colour that visually matches the label. -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">Colours</div>
                    <div class="card-body d-grid gap-2">
                        <!-- d-grid gap-2 makes all buttons full width with a gap between them -->
                        <button type="button" class="btn btn-primary" id="btnBlue">Blue</button>
                        <button type="button" class="btn btn-secondary" id="btnGrey">Grey</button>
                        <button type="button" class="btn btn-success" id="btnGreen">Green</button>
                        <button type="button" class="btn btn-danger" id="btnRed">Red</button>
                        <button type="button" class="btn btn-warning" id="btnYellow">Yellow</button>
                        <button type="button" class="btn btn-info" id="btnLightBlue">Light blue</button>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN — ordered log list.
                 <ol> produces a numbered list so the click order is visible. -->
            <div class="col-md">
                <div class="card">
                    <div class="card-header">Log</div>
                    <div class="card-body">
                        <!-- Ordered list — each button click appends a numbered entry -->
                        <ol id="result"></ol>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Cache the log list once — appended to on every button click
        const result = document.getElementById('result');

        // Map each button id to its colour label.
        // This allows a single addColor() call to be reused across all buttons
        // via the wrapper pattern covered in earlier exercises —
        // avoids repeating addEventListener six times with hardcoded strings.
        const buttons = [
            { id: 'btnBlue', colour: 'Blue' },
            { id: 'btnGrey', colour: 'Grey' },
            { id: 'btnGreen', colour: 'Green' },
            { id: 'btnRed', colour: 'Red' },
            { id: 'btnYellow', colour: 'Yellow' },
            { id: 'btnLightBlue', colour: 'Light blue' }
        ];

        // Arrow function wrapper passes the colour string as an argument —
        // the same pattern used in the event listener with parameters exercise.
        buttons.forEach(({ id, colour }) => {
            document.getElementById(id).addEventListener('click', () => addColor(colour));
        });

        // Appends a new numbered entry to the log list every time a button is clicked.
        // The <ol> handles the numbering automatically — no counter variable needed.
        function addColor(colour) {
            const time = new Date().toLocaleTimeString();

            const li = document.createElement('li');
            li.textContent = `${colour} — ${time}`;
            result.appendChild(li);
        }
    </script>

    <!-- Bootstrap JS bundle — required for navbar toggler and dropdown -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW"
        crossorigin="anonymous"></script>
</body>

</html>
