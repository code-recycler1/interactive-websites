<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript events - exercise 6</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-4">

        <!-- PLAYER CARDS — one card per player, generated by JavaScript below.
             Each card starts grey (bg-secondary) and turns green (bg-success)
             if that player rolls a six. -->
        <div class="row" id="playerGrid"></div>

        <!-- RESULT ALERT — shows how many sixes were rolled and whether
             the player's guess was correct -->
        <div class="row justify-content-center mt-3">
            <div class="col-4 align-self-center text-center">
                <div class="alert alert-info" id="result" role="alert"></div>
            </div>
        </div>

        <!-- PLAY and RESET buttons -->
        <div class="row justify-content-center mt-3">
            <div class="col-3 text-center">
                <button type="button" class="btn btn-primary" id="btnPlay">PLAY</button>
            </div>
            <div class="col-3 text-center">
                <button type="button" class="btn btn-danger" id="btnReset">RESET</button>
            </div>
        </div>

    </div>

    <script>
        // --- CONSTANTS ---
        const PLAYER_COUNT = 12; // Total number of players / dice rolls
        const WINNING_ROLL = 6;  // The target dice value

        // Cache the shared elements used across multiple functions
        const playerGrid = document.getElementById('playerGrid');
        const resultDiv = document.getElementById('result');
        const btnPlay = document.getElementById('btnPlay');
        const btnReset = document.getElementById('btnReset');

        // --- BUILD PLAYER CARDS ---
        // Generate all 12 player cards dynamically — avoids repeating the same
        // HTML block 12 times by hand. Each card gets a unique id (player1..player12).
        for (let i = 1; i <= PLAYER_COUNT; i++) {
            playerGrid.innerHTML +=
                `<div class="col-md-3 mb-3">
                    <div class="card text-white bg-secondary" id="player${i}">
                        <div class="card-body">
                            <h5 class="card-title">Player ${i}</h5>
                        </div>
                    </div>
                </div>`;
        }

        // --- EVENT LISTENERS ---
        // PLAY button — anonymous function as required by the exercise.
        // Calls reset() first to clear any previous game state,
        // then runs the full game sequence.
        btnPlay.addEventListener('click', function () {
            reset();

            // Ask the player for their guess and convert to integer.
            // The valid range is 0–12 (can't roll more sixes than there are players).
            const guess = parseInt(prompt(`How many times do you think a six will be rolled? (0–${PLAYER_COUNT})`));

            // Guard against invalid input — NaN, negative, or out of range
            if (isNaN(guess) || guess < 0 || guess > PLAYER_COUNT) {
                resultDiv.textContent = 'Please enter a valid number between 0 and 12.';
                return;
            }

            // --- ROLL DICE FOR ALL 12 PLAYERS ---
            let sixCount = 0; // Tracks how many players rolled a six

            for (let i = 1; i <= PLAYER_COUNT; i++) {
                // Math.random() returns a float between 0 (inclusive) and 1 (exclusive).
                // Multiplying by 6 and flooring gives an integer between 0 and 5.
                // Adding 1 shifts the range to 1–6, simulating a standard die.
                const roll = Math.floor(Math.random() * 6) + 1;

                if (roll === WINNING_ROLL) {
                    sixCount++;

                    // Change this player's card from grey to green —
                    // swap the Bootstrap background utility class
                    const card = document.getElementById(`player${i}`);
                    card.classList.remove('bg-secondary');
                    card.classList.add('bg-success');
                }
            }

            // --- DISPLAY RESULT ---
            // Build the result message comparing the actual count to the player's guess
            const guessMessage = guess === sixCount
                ? `🎉 Correct! You guessed ${guess} — exactly right!`
                : `❌ Wrong! You guessed ${guess} but ${sixCount} players rolled a six.`;

            resultDiv.innerHTML =
                `<strong>${sixCount} out of ${PLAYER_COUNT} players rolled a six.</strong><br>${guessMessage}`;
        });

        // RESET button — named function reference as required by the exercise
        btnReset.addEventListener('click', reset);

        // --- RESET FUNCTION ---
        // Restores all cards to their grey default and clears the result message.
        // Called both by the reset button AND at the start of each new game
        // to ensure a clean slate before rolling.
        function reset() {
            for (let i = 1; i <= PLAYER_COUNT; i++) {
                const card = document.getElementById(`player${i}`);
                card.classList.remove('bg-success');
                card.classList.add('bg-secondary');
            }
            resultDiv.textContent = '';
        }
    </script>

    <!-- Bootstrap JS bundle — required for navbar toggler and dropdown -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW" crossorigin="anonymous">
        </script>

</body>

</html>
