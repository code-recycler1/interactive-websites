<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS — provides all layout, card, form, and button styling -->

        integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <title>JavaScript events - Exercise 3</title>
</head>

<body>
    <!-- NAVBAR — Bootstrap responsive navigation bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <!-- Brand logo/name — links to the top of the page -->
            <a class="navbar-brand" href="#">IW</a>

            <!-- Hamburger toggle button — only visible on small screens.
                     Collapses/expands the nav links on mobile. -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapsible nav links — hidden on mobile, shown on larger screens -->
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <!-- External link to W3Schools JavaScript reference -->
                    <li class="nav-item">
                        <a class="nav-link" target="_blank" href="https://www.w3schools.com/js/DEFAULT.asp">W3Schools
                            JS</a>
                    </li>
                    <!-- External link to MDN JavaScript documentation -->
                    <li class="nav-item">
                        <a class="nav-link" target="_blank"
                            href="https://developer.mozilla.org/en-US/docs/Web/JavaScript">MDN JS docs</a>
                    </li>
                    <!-- Dropdown menu with specific Stack Overflow and reference links -->
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownMenuLink" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">Specific</a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                            <li><a class="dropdown-item" target="_blank"
                                    href="https://stackoverflow.com/questions/20673959/how-to-add-new-li-to-ul-onclick-with-javascript/20673977">Stack
                                    #1</a></li>
                            <li><a class="dropdown-item" target="_blank"
                                    href="https://stackoverflow.com/questions/10750137/remove-all-li-from-ul">Stack
                                    #2</a></li>
                            <li><a class="dropdown-item" target="_blank"
                                    href="https://tecadmin.net/get-current-date-time-javascript/">Date & Time</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT — Bootstrap grid layout -->
    <main class="container">
        <div class="row">
            <div class="col">
                <h1>JavaScript events - Exercise 3</h1>
            </div>
        </div>
        <div class="row">
            <!-- LEFT COLUMN — Product input card -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">Product</div>
                    <div class="card-body">
                        <form>
                            <div class="row">
                                <div class="col-md-6">
                                    <input type="text" class="form-control" id="product" placeholder="Description">
                                </div>
                                <div class="col-md-3">
                                    <select class="form-select" id="quantity">
                                        <option value="0" selected>Quantity</option>
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3">3</option>
                                        <option value="4">4</option>
                                        <option value="5">5</option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <input type="text" class="form-control" id="price" placeholder="Price in EURO">
                                </div>
                            </div>
                            <!-- Add event listener for the "Add" button -->
                            <button type="button" class="btn btn-success mt-2" id="btnAdd">Add</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN — Shopping cart + discount code card -->
            <div class="col-md">
                <div class="card">
                    <div class="card-header">Shopping cart</div>
                    <div class="card-body">
                        <!-- Product list — placeholder removed on first real add -->
                        <ul id="result">
                            <li>No products found</li>
                        </ul>
                    </div>
                    <div class="card-footer text-muted">
                        <div class="row">
                            <div class="col-md-8">
                                <b>
                                    <!-- totalInfo is now a separate element so its
                                         text can be updated to show the discount percentage
                                         e.g. "Total (20% discount applied)" -->
                                    <div id="totalInfo">Total</div>
                                </b>
                            </div>
                            <div class="col-md-4 text-end" id="total">€0</div>
                        </div>
                    </div>
                </div>

                <!-- Discount code card
                     The code field listens for keyup so the code is checked
                     on every keystroke as the user types, not just on submit. -->
                <div class="card mt-3">
                    <div class="card-header">Discount code</div>
                    <div class="card-body">
                        <!-- The id "code" is used to listen for keyup events and check the code value.
                            The id "discountCode" is used to read the code value when applying the discount. -->
                        <input type="text" class="form-control" id="code" placeholder="Code" id="discountCode">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Cache all elements once
        const productInput = document.getElementById('product');
        const quantitySelect = document.getElementById('quantity');
        const priceInput = document.getElementById('price');
        const resultList = document.getElementById('result');
        const totalDisplay = document.getElementById('total');
        const totalInfo = document.getElementById('totalInfo');
        const codeInput = document.getElementById('code');
        const btnAdd = document.getElementById('btnAdd');

        btnAdd.addEventListener('click', addProduct);
        codeInput.addEventListener('keyup', checkCode);

        // Running total before any discount — stored separately so the
        // discount can always be recalculated against the original price
        let runningTotal = 0;

        // Valid discount codes and their reduction percentage.
        // Each entry also tracks whether the code has already been used —
        // once redeemed, the same code cannot be applied again.
        const discountCodes = {
            'NICK': { discount: 20, used: false },
            'STEVE': { discount: 20, used: false },
            'MICHAEL': { discount: 20, used: false }
        };

        // Currently active discount percentage — 0 means no discount is applied
        let activeDiscount = 0;

        function addProduct() {
            const description = productInput.value.trim();
            const quantity = parseInt(quantitySelect.value);
            const price = parseFloat(priceInput.value);

            // Guard against incomplete or invalid input
            if (description === '' || quantity === 0 || isNaN(price) || price <= 0) {
                alert('Please fill in all fields correctly.');
                return;
            }

            // Remove the placeholder on the first real add
            if (resultList.children.length === 1 &&
                resultList.children[0].textContent === 'No products found') {
                resultList.innerHTML = '';
            }

            const lineTotal = quantity * price;

            const li = document.createElement('li');
            li.textContent =
                `${description} — ${quantity} × €${price.toFixed(2)} = €${lineTotal.toFixed(2)}`;
            resultList.appendChild(li);

            runningTotal += lineTotal;
            updateTotal();

            productInput.value = '';
            quantitySelect.value = '0';
            priceInput.value = '';
            productInput.focus();
        }

        function checkCode() {
            // Normalize to uppercase so 'nick', 'Nick', 'NICK' all match
            const entered = codeInput.value.trim().toUpperCase();
            const code = discountCodes[entered];

            if (code === undefined) {
                // Not a recognised code — reset discount but don't show an error
                // yet, the user may still be typing
                activeDiscount = 0;
            } else if (code.used) {
                // Code is valid but has already been redeemed
                activeDiscount = 0;
                codeInput.classList.add('is-invalid');
                codeInput.classList.remove('is-valid');
            } else {
                // Valid and unused code — apply the discount
                activeDiscount = code.discount;
                code.used = true; // Mark as used immediately so it cannot be reused
                codeInput.classList.add('is-valid');
                codeInput.classList.remove('is-invalid');
                codeInput.disabled = true; // Lock the field — code is consumed, no further input
            }

            updateTotal();
        }

        // Recalculates and updates the displayed total.
        // Called both when a product is added and when the discount code changes.
        function updateTotal() {
            if (activeDiscount > 0) {
                const discountAmount = runningTotal * (activeDiscount / 100);
                const discountedTotal = runningTotal - discountAmount;
                totalInfo.textContent = `Total (${activeDiscount}% discount applied)`;
                totalDisplay.textContent = `€${discountedTotal.toFixed(2)}`;
            } else {
                totalInfo.textContent = 'Total';
                totalDisplay.textContent = `€${runningTotal.toFixed(2)}`;
            }
        }
    </script>

    <!-- Bootstrap JS bundle — required for navbar toggler and dropdown -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW"
        crossorigin="anonymous"></script>
</body>

</html>
