<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Introduction - Exercise 5</title>
</head>

<body>

    <script>
        // Operation 1
        let number1 = 0;
        let counter1 = 10;
        number1 = counter1++; // post-increment

        // Operation 2
        let number2 = 0;
        let counter2 = 10;
        number2 = ++counter2; // pre-increment

        document.write('<strong>Operation 1 (number = counter++):</strong><br>');
        document.write(`number = ${number1}<br>`);   // 10
        document.write(`counter = ${counter1}<br><br>`); // 11

        document.write('<strong>Operation 2 (number = ++counter):</strong><br>');
        document.write(`number = ${number2}<br>`);   // 11
        document.write(`counter = ${counter2}<br>`);

        /*
        Difference:
            counter++ (post - increment):
            The current value is assigned first, then the variable is incremented.
            → number = 10, counter = 11

            ++counter(pre - increment):
            The variable is incremented first, then the new value is assigned.
            → number = 11, counter = 11

            Conclusion: The position of++ determines whether the increment happens before or after the assignment.
        */

    </script>

</body>

</html>
