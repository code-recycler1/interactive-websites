<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Exercise 1 - Weather app</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="font-lora">
    <div class="container-fluid">
        <!-- Weather icon image — src is set dynamically from the API response -->
        <img src="" alt="Weather icon" id="weather-icon">

        <!-- Fallback text shown until the API responds successfully -->
        <div id="location">Weather could not be loaded.</div>

        <!-- Weather description e.g. "light rain", "clear sky" -->
        <div class="desc">/</div>

        <!-- Temperature in Celsius -->
        <div class="weather">
            <div class="c">/</div>
        </div>

        <!-- Date, sunrise, and sunset times -->
        <div class="info">
            <h4>
                <div class="date">/</div>
            </h4>
            <h4>Sunrise: <span class="sunrise">/</span></h4>
            <h4>Sunset: <span class="sunset">/</span></h4>
        </div>
    </div>
</body>

<script>
    // ⚠️ Never commit a real API key to a public repository.
    // In production, API keys belong in environment variables on a server,
    // not in client-side JavaScript where anyone can read them.
    const API_KEY = 'YOUR_API_KEY'; // Register free at openweathermap.org

    // Cache all DOM elements once before any async work begins
    const iconImg = document.querySelector('#weather-icon');
    const loc = document.querySelector('#location');
    const tempC = document.querySelector('.c');
    const desc = document.querySelector('.desc');
    const dateEl = document.querySelector('.date');
    const sunriseEl = document.querySelector('.sunrise');
    const sunsetEl = document.querySelector('.sunset');

    // Wait for the page to fully load before requesting geolocation.
    // Geolocation requires user permission — the browser shows a prompt.
    window.addEventListener('load', () => {

        // Check that the browser supports the Geolocation API.
        // Older browsers and some environments (e.g. non-HTTPS) may not support it.
        if (navigator.geolocation) {

            // getCurrentPosition() is asynchronous — it calls the callback
            // once the device has determined its position.
            // The second argument (not used here) would be an error callback.
            navigator.geolocation.getCurrentPosition(position => {

                // Extract latitude and longitude from the Position object
                const lat = position.coords.latitude;
                const long = position.coords.longitude;

                // Build the OpenWeatherMap API URL with:
                // - lat/lon from geolocation
                // - units=metric for Celsius temperatures
                // - lang=nl for Dutch weather descriptions (change to 'en' for English)
                const url =
                    `https://api.openweathermap.org/data/2.5/weather` +
                    `?lat=${lat}&lon=${long}&appid=${API_KEY}&units=metric&lang=en`;

                // Fetch weather data for the user's current coordinates
                fetch(url)
                    .then(response => {
                        // fetch() resolves for all HTTP responses — check status manually.
                        // A bad API key returns 401, an invalid URL returns 404 etc.
                        if (!response.ok) {
                            throw new Error(`HTTP error: ${response.status} ${response.statusText}`);
                        }
                        return response.json(); // Parse the response body as a JS object
                    })
                    .then(data => {
                        console.log(data.main); // Log raw temperature data for debugging

                        // OBJECT DESTRUCTURING — extracts multiple properties in one line.
                        // Equivalent to: const temp = data.main.temp; const feels_like = ...
                        const { temp, feels_like } = data.main;

                        // City name from the API response
                        const place = data.name;

                        // Weather description and icon code from the first weather object.
                        // The API can return multiple weather conditions — [0] is the primary one.
                        const { description, icon } = data.weather[0];

                        // Unix timestamps (seconds since 1 Jan 1970) for sunrise and sunset
                        const { sunrise, sunset } = data.sys;

                        // Build the icon URL using the icon code from the API.
                        // @2x requests the double-resolution version for sharper display.
                        const iconUrl = `http://openweathermap.org/img/wn/${icon}@2x.png`;

                        // Convert Unix timestamps (seconds) to JavaScript Date objects.
                        // JavaScript Date() expects milliseconds, so multiply by 1000.
                        const sunriseDate = new Date(sunrise * 1000);
                        const sunsetDate = new Date(sunset * 1000);

                        // --- UPDATE THE DOM ---
                        iconImg.src = iconUrl;
                        iconImg.alt = description;
                        loc.textContent = place;
                        desc.textContent = description;
                        // toFixed(1) formats temperature to one decimal place e.g. "12.4 °C"
                        tempC.textContent = `${temp.toFixed(1)} °C`;

                        // Format the date using the Intl internationalisation API.
                        // 'en-GB' with dateStyle 'full' gives e.g. "Tuesday, 22 April 2026"
                        dateEl.textContent = new Intl.DateTimeFormat('en-GB', {
                            dateStyle: 'full'
                        }).format(sunsetDate);

                        // toLocaleTimeString() formats using the user's local time settings
                        // e.g. "06:14:32" or "6:14 AM" depending on locale
                        sunriseEl.textContent = sunriseDate.toLocaleTimeString();
                        sunsetEl.textContent = sunsetDate.toLocaleTimeString();
                    })
                    .catch(err => {
                        // Display the error in the location element so the user knows
                        // something went wrong — better than silent failure
                        loc.textContent = `Error loading weather: ${err.message}`;
                        console.error('Fetch error:', err);
                    });

            }); // getCurrentPosition callback

        } else {
            // Browser does not support Geolocation API
            loc.textContent = 'Geolocation is not supported by your browser.';
        }

    }); // load event
</script>

</html>
