<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 3 - Movie app :: sort & filter</title>
    <link rel="shortcut icon" href="#">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
</head>

<body>
    <div class="container p-4">
        <h4>Find, sort & filter movies</h4>
        <form name="myForm" id="myForm">
            <div class="form-row">
                <!-- Search input — minimum 2 characters required before fetching -->
                <div class="col-md-4">
                    <div class="form-group">
                        <label for="search" class="text-danger">Search term</label>
                        <input type="text" class="form-control" id="search" placeholder="Game of Thrones" value="game">
                    </div>
                </div>

                <!-- Sort dropdown — value encodes both field and direction e.g. "original_name#az" -->
                <div class="col-md-3">
                    <div class="form-group">
                        <label for="sort" class="text-danger">Sort</label>
                        <select class="form-control" id="sort">
                            <option value="original_name#az" selected>Name A-Z</option>
                            <option value="original_name#za">Name Z-A</option>
                            <option value="vote_average#az">Vote A-Z</option>
                            <option value="vote_average#za">Vote Z-A</option>
                        </select>
                    </div>
                </div>

                <!-- Filter radio buttons — mutually exclusive, only one can be selected -->
                <div class="col-md-4 ml-5">
                    <div class="form-group">
                        <label class="text-danger">Filter</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="filterVotes" id="filterVotesG8"
                                value="filterVotesG8" checked>
                            <label class="form-check-label" for="filterVotesG8">Votes > 8</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="filterVotes" id="filterVotesKG8"
                                value="filterVotesKG8">
                            <label class="form-check-label" for="filterVotesKG8">Votes &lt;= 8</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="filterVotes" id="filterVotesK5"
                                value="filterVotesK5">
                            <label class="form-check-label" for="filterVotesK5">Votes &lt; 5</label>
                        </div>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary mb-2" id="searchMovies">Search</button>
        </form>

        <div class="mt-2">
            <table id="tableSearch" class="table table-light table-sm table-striped table-hover table-bordered">
                <thead class="thead-dark">
                    <tr>
                        <th scope="col">Original name</th>
                        <th scope="col">Vote average</th>
                        <th scope="col">First air date</th>
                    </tr>
                </thead>
                <!-- Table rows are injected here by showData() -->
                <tbody id="tdata"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ⚠️ Replace with your own API key from themoviedb.org
        const API_KEY = 'YOUR_API_KEY';

        // Cache the form reference — used to access radio buttons via elements.filterVotes
        const form = document.myForm;

        // --- EVENT LISTENERS ---
        // The form's submit event covers the Search button click.
        // e.preventDefault() stops the page from reloading on submission.
        form.addEventListener('submit', getData);

        // Re-trigger getData whenever the sort dropdown changes —
        // results update immediately without clicking Search again.
        document.querySelector('#sort').addEventListener('change', getData);

        // Attach a change listener to every radio button so filtering
        // also re-triggers getData immediately on selection.
        const radios = document.querySelectorAll(
            '#filterVotesG8, #filterVotesKG8, #filterVotesK5'
        );
        radios.forEach(radio => radio.addEventListener('change', getData));

        // --- getData() ---
        // Triggered by form submit, sort change, or radio button change.
        // Validates the search term, builds the API URL, and fetches results.
        function getData(e) {
            e.preventDefault(); // Prevent default form submission / page reload

            const search = document.querySelector('#search').value;

            // Minimum search term length check — avoids overly broad API queries
            if (search.length < 2) {
                alert('Please enter at least 2 characters.');
                return;
            }

            // Build the TMDB TV search URL with the search term and API key.
            // include_adult=false excludes adult content from results.
            fetch(`https://api.themoviedb.org/3/search/tv` +
                `?api_key=${API_KEY}&language=en-US&query=${search}&include_adult=false`)
                .then(response => {
                    if (response.status !== 200) {
                        console.log('Unexpected status code:', response.status);
                        return;
                    }
                    return response.json();
                })
                .then(data => {
                    showData(data);
                })
                .catch(err => {
                    console.error('Fetch error:', err);
                });
        }

        // --- showData() ---
        // Receives the raw API response, cleans, sorts, filters, and renders it.
        // Three operations in sequence: clean → sort → filter → render.
        function showData(data) {
            const tbody = document.querySelector('#tdata');

            // STEP 1 — CLEAN: remove results with zero votes.
            // vote_count = 0 means no one has rated it — the vote_average is meaningless.
            let workingData = data.results.filter(item => item.vote_count > 0);

            // STEP 2 — SORT: reorder based on the selected dropdown option
            workingData = sortData(workingData);

            // STEP 3 — FILTER: keep only results matching the selected radio button
            workingData = filterData(workingData);

            // STEP 4 — RENDER: build the table rows as a single string and inject once.
            // Building the full string first and writing once is more efficient than
            // appending a row on every iteration (avoids repeated reflows).
            let tableHTML = '';
            workingData.forEach(movie => {
                tableHTML +=
                    `<tr>
                        <td>${movie.original_name}</td>
                        <td>${movie.vote_average}</td>
                        <td>${movie.first_air_date}</td>
                    </tr>`;
            });
            tbody.innerHTML = tableHTML;
        }

        // --- sortData() ---
        // Reads the selected sort option and sorts the array accordingly.
        // Option values use the format "fieldName#direction" e.g. "vote_average#za".
        // Splitting on "#" separates the field name from the sort direction.
        function sortData(data) {
            const sortEl = document.querySelector('#sort');
            const sortVal = sortEl.options[sortEl.selectedIndex].value;

            // Split "original_name#az" into ["original_name", "az"]
            const [sortField, direction] = sortVal.split('#');

            // Array.sort() with a comparator function.
            // Bracket notation (a[sortField]) is required here because sortField is a variable —
            // dot notation (a.sortField) would literally look for a key named "sortField".
            if (direction === 'az') {
                // Ascending — returns 1 if a > b (swap), -1 if b > a (keep), 0 if equal
                data.sort((a, b) =>
                    a[sortField] > b[sortField] ? 1 :
                        b[sortField] > a[sortField] ? -1 : 0
                );
            } else {
                // Descending — returns 1 if a < b (swap), -1 if b < a (keep), 0 if equal
                data.sort((a, b) =>
                    a[sortField] < b[sortField] ? 1 :
                        b[sortField] < a[sortField] ? -1 : 0
                );
            }

            return data;
        }

        // --- filterData() ---
        // Reads the selected radio button and filters the array by vote_average.
        // Uses Array.from() on the RadioNodeList to find the checked radio,
        // then switches on its value to apply the correct filter condition.
        function filterData(data) {
            // Two ways to get the checked radio value — both are equivalent:
            // Option A: frm.querySelector('input[name=filterVotes]:checked').value
            // Option B: Array.from(frm.elements.filterVotes).find(r => r.checked).value
            const selectedFilter = Array
                .from(form.elements.filterVotes)
                .find(radio => radio.checked).value;

            switch (selectedFilter) {
                case 'filterVotesG8':
                    // Keep only shows with a vote average ABOVE 8
                    return data.filter(item => item.vote_average > 8);

                case 'filterVotesKG8':
                    // Keep only shows with a vote average AT OR BELOW 8
                    return data.filter(item => item.vote_average <= 8);

                case 'filterVotesK5':
                    // Keep only shows with a vote average BELOW 5
                    return data.filter(item => item.vote_average < 5);

                default:
                    return data; // No matching case — return unfiltered
            }
        }
    </script>
</body>

</html>
