<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>XMLHttpRequest — OpenWeatherMap with reviver and date</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>XMLHttpRequest — OpenWeatherMap + parse + reviver + date</h1>
                <button id="buttonRequest" class="btn btn-primary my-3">Click for XMLHttpRequest</button>
                <div id="divResult" class="alert text-wrap overflow-auto" role="alert">
                    Result will appear here...
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('#buttonRequest').addEventListener('click', myRequest);

        function myRequest() {
            const xhr = new XMLHttpRequest();
            const divRes = document.querySelector('#divResult');

            // Metric units and Dutch language for weather descriptions.
            // ⚠️ Replace the appid value with your own API key.
            xhr.open('GET',
                'http://api.openweathermap.org/data/2.5/weather?q=deurne&units=metric&lang=nl&appid=YOUR_API_KEY',
                true);

            xhr.send();

            xhr.onload = function () {
                if (xhr.status !== 200) {
                    divRes.innerHTML = `Error ${xhr.status}: ${xhr.statusText}`;
                    divRes.classList.remove('alert-success');
                    divRes.classList.add('alert-danger');
                } else {
                    console.log(xhr.responseText);

                    // Parse the JSON response with a REVIVER.
                    // The OpenWeatherMap API returns sunrise and sunset as UNIX timestamps —
                    // seconds elapsed since 1 January 1970.
                    // The reviver intercepts these two keys and converts their values
                    // to formatted time strings using Intl.DateTimeFormat.
                    // Multiplying by 1000 converts seconds → milliseconds for the Date constructor.
                    const obj = JSON.parse(xhr.responseText, function (key, value) {
                        if (key === 'sunset' || key === 'sunrise') {
                            return new Intl.DateTimeFormat('en-GB', {
                                hour: 'numeric',
                                minute: 'numeric',
                                second: 'numeric',
                                hour12: false
                            }).format(new Date(value * 1000));
                        }
                        return value;
                    });

                    console.log(obj);

                    // By the time we read obj.sys.sunrise here, the reviver has already
                    // replaced the raw Unix timestamp with a formatted time string.
                    divRes.innerHTML =
                        `In ${obj.name} the sun rises today at ${obj.sys.sunrise} ` +
                        `and sets at ${obj.sys.sunset}. ` +
                        `Weather: ${obj.weather[0].description}.`;

                    divRes.classList.remove('alert-danger');
                    divRes.classList.add('alert-success');
                }
            };

            xhr.onerror = function () {
                divRes.innerHTML = 'Request failed';
                divRes.classList.remove('alert-success');
                divRes.classList.add('alert-danger');
            };
        }
    </script>
</body>

</html>
