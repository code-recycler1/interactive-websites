<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="shortcut icon" href="#">
    <title>Simple XMLHttpRequest — OpenWeatherMap</title>
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Simple XMLHttpRequest — OpenWeatherMap</h1>
                <button id="buttonRequest" class="btn btn-primary my-3">Click for XMLHttpRequest</button>
                <div id="divResult" class="alert alert-info text-wrap overflow-auto" role="alert">
                    Result will appear here...
                </div>
            </div>
        </div>
    </div>

    <script>
        document.querySelector('#buttonRequest').addEventListener('click', myRequest);

        function myRequest() {
            const xhr = new XMLHttpRequest();
            const divRes = document.querySelector('#divResult');

            // GET request to the OpenWeatherMap API.
            // https://openweathermap.org/api
            // ⚠️ Replace the APPID value with your own API key.
            // No units or lang parameters — returns raw Kelvin temperatures.
            xhr.open('GET',
                'http://api.openweathermap.org/data/2.5/weather?q=deurne&APPID=YOUR_API_KEY',
                true);

            xhr.send();

            xhr.onload = function () {
                if (xhr.status !== 200) {
                    divRes.innerHTML = `Error ${xhr.status}: ${xhr.statusText}`;
                } else {
                    // Display the raw JSON response string directly — not parsed.
                    // This is useful for inspecting the full API response structure
                    // before deciding which fields to use.
                    const res = xhr.responseText;
                    console.log(res);
                    divRes.innerHTML = res;
                }
            };

            xhr.onerror = function () {
                // Fires on network errors — e.g. wrong domain or no internet
                divRes.innerHTML = 'Request failed';
            };
        }
    </script>
</body>

</html>
