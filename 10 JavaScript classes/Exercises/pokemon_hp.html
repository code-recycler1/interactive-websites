<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
    <title>Pokémon v2.0</title>
</head>

<body>
    <main class="container">
        <h1>Pokémon v2.0</h1>
        <p class="lead">Gotta catch 'em all</p>
        <div class="row">
            <!-- PLAYER 1 CARD -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h2>Player 1</h2>
                        <select class="form-select mb-1" id="player1-pokemon">
                            <option value="-1" selected>Choose your Pokémon</option>
                        </select>
                        <img src="img/pokeball.png" class="mx-auto d-block" id="player1-img" alt="Player 1 Pokémon">
                        <!-- HP progress bar — width is updated dynamically as HP changes.
                             aria-valuemin/max provide accessibility context. -->
                        <div class="progress">
                            <div id="player1-progress"
                                class="progress-bar progress-bar-striped progress-bar-animated bg-danger"
                                role="progressbar" title="Current hitpoints" style="width: 100%" aria-valuemin="0"
                                aria-valuemax="100"></div>
                        </div>
                        <table class="table">
                            <tr>
                                <th>HP (remaining)</th>
                                <td id="player1-hp">-</td>
                            </tr>
                            <tr>
                                <th>Type</th>
                                <td id="player1-type">-</td>
                            </tr>
                            <tr>
                                <th>Attack (min)</th>
                                <td id="player1-min">-</td>
                            </tr>
                            <tr>
                                <th>Attack (max)</th>
                                <td id="player1-max">-</td>
                            </tr>
                        </table>
                        <div class="d-grid">
                            <button class="btn btn-success" id="player1-attack">Attack</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PLAYER 2 CARD — identical structure -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h2>Player 2</h2>
                        <select class="form-select mb-1" id="player2-pokemon">
                            <option value="-1" selected>Choose your Pokémon</option>
                        </select>
                        <img src="img/pokeball.png" class="mx-auto d-block" id="player2-img" alt="Player 2 Pokémon">
                        <div class="progress">
                            <div id="player2-progress"
                                class="progress-bar progress-bar-striped progress-bar-animated bg-danger"
                                role="progressbar" title="Current hitpoints" style="width: 100%" aria-valuemin="0"
                                aria-valuemax="100"></div>
                        </div>
                        <table class="table">
                            <tr>
                                <th>HP (remaining)</th>
                                <td id="player2-hp">-</td>
                            </tr>
                            <tr>
                                <th>Type</th>
                                <td id="player2-type">-</td>
                            </tr>
                            <tr>
                                <th>Attack (min)</th>
                                <td id="player2-min">-</td>
                            </tr>
                            <tr>
                                <th>Attack (max)</th>
                                <td id="player2-max">-</td>
                            </tr>
                        </table>
                        <div class="d-grid">
                            <button class="btn btn-success" id="player2-attack">Attack</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ACTION INFO BAR -->
            <div class="col mt-3">
                <div class="card text-center">
                    <div class="card-body" id="actioninfo">-</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- POKEMON CLASS ---
        class Pokemon {
            constructor(name, type, attackMin, attackMax, hitpoints, image) {
                this.name = name;
                this.type = type;
                this.attackMin = attackMin;
                this.attackMax = attackMax;
                this.hitpoints = hitpoints; // base HP — never changes
                this.image = image;
                this.currentHP = hitpoints; // tracks HP during battle
            }

            // NEW v2: 25% miss chance.
            // Math.random() < 0.25 is cleaner than rolling 1-4 and checking === 1 —
            // both give a 25% chance but the probability expression is self-documenting.
            attack() {
                if (Math.random() < 0.25) {
                    console.log(`${this.name} missed their attack!`);
                    return 0; // 0 damage on a miss
                }
                const min = Math.ceil(this.attackMin);
                const max = Math.floor(this.attackMax);
                return Math.floor(Math.random() * (max - min + 1) + min);
            }

            // Returns "base (current)" e.g. "100 (75)"
            hp() {
                return `${this.hitpoints} (${this.currentHP})`;
            }

            // NEW v2: returns currentHP as a percentage of base HP, clamped to 0.
            // Used to set the progress bar width.
            // Math.max(0, ...) prevents negative percentages when HP goes below 0.
            hpPercent() {
                return Math.max(0, Math.round((this.currentHP / this.hitpoints) * 100));
            }
        }

        // --- CACHE SELECT ELEMENTS ---
        const selectPlayer1 = document.querySelector('#player1-pokemon');
        const selectPlayer2 = document.querySelector('#player2-pokemon');

        // --- CREATE POKEMON ARRAYS ---
        // Separate instances per player — critical so HP changes don't bleed across players
        const player1Pokemon = [
            new Pokemon('Squirtle', 'Water', 20, 45, 100, 'Squirtle.gif'),
            new Pokemon('Bulbasaur', 'Grass', 25, 40, 120, 'Bulbasaur.gif'),
            new Pokemon('Charmander', 'Fire', 30, 55, 80, 'Charmander.gif'),
            new Pokemon('Onix', 'Ground', 20, 30, 150, 'Onix.gif')
        ];

        const player2Pokemon = [
            new Pokemon('Squirtle', 'Water', 20, 45, 100, 'Squirtle.gif'),
            new Pokemon('Bulbasaur', 'Grass', 25, 40, 120, 'Bulbasaur.gif'),
            new Pokemon('Charmander', 'Fire', 30, 55, 80, 'Charmander.gif'),
            new Pokemon('Onix', 'Ground', 20, 30, 150, 'Onix.gif')
        ];

        // --- POPULATE DROPDOWNS ---
        // forEach provides index as second parameter — no separate counter needed
        player1Pokemon.forEach((pokemon, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.textContent = pokemon.name;
            selectPlayer1.appendChild(opt);
        });

        player2Pokemon.forEach((pokemon, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.textContent = pokemon.name;
            selectPlayer2.appendChild(opt);
        });

        // --- SELECTION CHANGE LISTENERS ---
        selectPlayer1.addEventListener('change', function () {
            updatePokemon('player1', this.value);
        });

        selectPlayer2.addEventListener('change', function () {
            updatePokemon('player2', this.value);
        });

        // --- updatePokemon() ---
        // The if/else branch duplicated all DOM writes for player1 vs player2.
        // A simple array lookup eliminates the duplication entirely —
        // one block handles both players with no repeated code.
        function updatePokemon(player, pokemonId) {
            if (pokemonId === '-1') return;

            // Select the correct array based on player string — no branching needed
            const pokemonArray = (player === 'player1') ? player1Pokemon : player2Pokemon;
            const pokemon = pokemonArray[pokemonId];
            const percent = pokemon.hpPercent();

            document.querySelector(`#${player}-img`).src = `img/${pokemon.image}`;
            document.querySelector(`#${player}-type`).textContent = pokemon.type;
            document.querySelector(`#${player}-min`).textContent = pokemon.attackMin;
            document.querySelector(`#${player}-max`).textContent = pokemon.attackMax;
            document.querySelector(`#${player}-hp`).textContent = pokemon.hp();

            // NEW v2: update progress bar width and label.
            // style.width updates the visual bar width as a percentage string.
            // textContent shows the percentage number inside the bar.
            // When HP hits 0, hpPercent() returns 0 — bar collapses and label clears.
            const progressBar = document.querySelector(`#${player}-progress`);
            progressBar.style.width = `${percent}%`;
            progressBar.textContent = percent > 0 ? `${percent}%` : '';
        }

        // --- ATTACK BUTTON LISTENERS ---
        document.querySelector('#player1-attack').addEventListener('click', function () {
            attackPokemon(
                'player1', 'player2',
                player1Pokemon[selectPlayer1.value],
                player2Pokemon[selectPlayer2.value]
            );
        });

        document.querySelector('#player2-attack').addEventListener('click', function () {
            attackPokemon(
                'player2', 'player1',
                player2Pokemon[selectPlayer2.value],
                player1Pokemon[selectPlayer1.value]
            );
        });

        // --- attackPokemon() ---
        function attackPokemon(playerAttack, playerDefend, attacker, defender) {
            if (attacker.currentHP <= 0) {
                alert(`${attacker.name} has fainted — you can't attack!`);
                return;
            }

            const damage = attacker.attack(); // returns 0 on a miss

            defender.currentHP -= damage;

            // Refresh defender's card — HP display and progress bar update together
            updatePokemon(playerDefend, document.querySelector(`#${playerDefend}-pokemon`).value);

            const actionInfo = document.querySelector('#actioninfo');

            if (damage === 0) {
                // Miss — no HP change, inform both players
                actionInfo.textContent = `${attacker.name} missed their attack!`;
            } else if (defender.currentHP <= 0) {
                actionInfo.textContent =
                    `${attacker.name} attacks with ${damage} damage — ${defender.name} has fainted!`;
            } else {
                actionInfo.textContent =
                    `${attacker.name} attacks with ${damage} damage — ${defender.name} has ${defender.currentHP} HP remaining.`;
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf"
        crossorigin="anonymous"></script>
</body>

</html>
