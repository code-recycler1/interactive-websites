<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-eOJMYsd53ii+scO/bJGFsiCZc+5NDVN2yr8+0RDqr0Ql0h+rP48ckxlpbzKgwra6" crossorigin="anonymous">
    <title>Pokémon v3.0</title>
</head>

<body>
    <main class="container">
        <h1>Pokémon v3.0</h1>
        <p class="lead">Gotta catch 'em all</p>

        <!-- ACTION INFO BAR — moved to top so it's always visible -->
        <div class="row">
            <div class="col mb-3">
                <div class="card text-center">
                    <div class="card-body" id="actioninfo">Ready for battle?</div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- PLAYER 1 CARD -->
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <!-- h2 is updated when player changes their name via the modal -->
                        <h2 id="player1-name">Player 1</h2>
                        <select class="form-select mb-1" id="player1-pokemon">
                            <option value="-1" selected>Choose your Pokémon</option>
                        </select>
                        <img src="img/pokeball.png" class="mx-auto d-block" id="player1-img" alt="Player 1 Pokémon">
                        <div class="progress">
                            <div id="player1-progress"
                                class="progress-bar progress-bar-striped progress-bar-animated bg-danger"
                                role="progressbar" title="Current hitpoints" style="width: 100%" aria-valuemin="0"
                                aria-valuemax="100"></div>
                        </div>
                        <table class="table">
                            <tr>
                                <th>HP (remaining)</th>
                                <td id="player1-hp">-</td>
                            </tr>
                            <tr>
                                <th>Type</th>
                                <td id="player1-type">-</td>
                            </tr>
                            <tr>
                                <th>Attack (min)</th>
                                <td id="player1-min">-</td>
                            </tr>
                            <tr>
                                <th>Attack (max)</th>
                                <td id="player1-max">-</td>
                            </tr>
                            <!-- Shows remaining hyper potions — starts at 5 -->
                            <tr>
                                <th>Hyper potion</th>
                                <td id="player1-hyperpotion">5</td>
                            </tr>
                        </table>
                        <div class="row">
                            <div class="col-md-6 d-grid">
                                <button class="btn btn-success" id="player1-attack">Attack</button>
                            </div>
                            <div class="col-md-6 d-grid">
                                <!-- NEW v3: uses one of the player's 5 hyper potions -->
                                <button class="btn btn-warning" id="player1-heal">Hyper potion</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PLAYER 2 CARD — identical structure -->
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h2 id="player2-name">Player 2</h2>
                        <select class="form-select mb-1" id="player2-pokemon">
                            <option value="-1" selected>Choose your Pokémon</option>
                        </select>
                        <img src="img/pokeball.png" class="mx-auto d-block" id="player2-img" alt="Player 2 Pokémon">
                        <div class="progress">
                            <div id="player2-progress"
                                class="progress-bar progress-bar-striped progress-bar-animated bg-danger"
                                role="progressbar" title="Current hitpoints" style="width: 100%" aria-valuemin="0"
                                aria-valuemax="100"></div>
                        </div>
                        <table class="table">
                            <tr>
                                <th>HP (remaining)</th>
                                <td id="player2-hp">-</td>
                            </tr>
                            <tr>
                                <th>Type</th>
                                <td id="player2-type">-</td>
                            </tr>
                            <tr>
                                <th>Attack (min)</th>
                                <td id="player2-min">-</td>
                            </tr>
                            <tr>
                                <th>Attack (max)</th>
                                <td id="player2-max">-</td>
                            </tr>
                            <tr>
                                <th>Hyper potion</th>
                                <td id="player2-hyperpotion">5</td>
                            </tr>
                        </table>
                        <div class="row">
                            <div class="col-md-6 d-grid">
                                <button class="btn btn-success" id="player2-attack">Attack</button>
                            </div>
                            <div class="col-md-6 d-grid">
                                <button class="btn btn-warning" id="player2-heal">Hyper potion</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- NEW v3: opens Bootstrap modal to change player display names -->
        <a href="#" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#playerNamesModal">
            Change player names
        </a>
    </main>

    <!-- NEW v3: Bootstrap modal for changing player names.
         data-bs-toggle and data-bs-target on the link above handle open/close automatically.
         The "Aye!" button has id="changePlayerNames" — our listener reads the inputs on click. -->
    <div class="modal fade" id="playerNamesModal" tabindex="-1" aria-labelledby="playerNamesModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="playerNamesModalLabel">Change players</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="player1-fullname" class="form-label">Player 1</label>
                        <input type="text" class="form-control" id="player1-fullname" placeholder="John">
                    </div>
                    <div class="mb-3">
                        <label for="player2-fullname" class="form-label">Player 2</label>
                        <input type="text" class="form-control" id="player2-fullname" placeholder="Jane">
                    </div>
                </div>
                <div class="modal-footer">
                    <!-- data-bs-dismiss closes the modal automatically after click -->
                    <button type="button" class="btn btn-secondary" id="changePlayerNames"
                        data-bs-dismiss="modal">Aye!</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- POKEMON CLASS ---
        class Pokemon {
            constructor(name, type, attackMin, attackMax, hitpoints, image) {
                this.name = name;
                this.type = type;
                this.attackMin = attackMin;
                this.attackMax = attackMax;
                this.hitpoints = hitpoints; // base HP — never changes
                this.image = image;
                this.currentHP = hitpoints; // decreases during battle
            }

            // 25% miss chance — returns 0 on miss, random damage otherwise
            attack() {
                if (Math.random() < 0.25) {
                    console.log(`${this.name} missed their attack!`);
                    return 0;
                }
                const min = Math.ceil(this.attackMin);
                const max = Math.floor(this.attackMax);
                return Math.floor(Math.random() * (max - min + 1) + min);
            }

            // NEW v3: restores 50 HP, capped at the base hitpoints value.
            // Math.min() is cleaner than an if/else check:
            // if currentHP + 50 would exceed base, use base instead.
            hyperPotion() {
                this.currentHP = Math.min(this.currentHP + 50, this.hitpoints);
            }

            hp() {
                return `${this.hitpoints} (${this.currentHP})`;
            }

            hpPercent() {
                return Math.max(0, Math.round((this.currentHP / this.hitpoints) * 100));
            }
        }

        // --- PLAYER STATE ---
        // Track hyper potion counts separately from the Pokémon objects —
        // potions belong to the player, not to any individual Pokémon.
        const playerState = {
            player1: { name: 'Player 1', potions: 5 },
            player2: { name: 'Player 2', potions: 5 }
        };

        // --- POKEMON ARRAYS ---
        const player1Pokemon = [
            new Pokemon('Squirtle', 'Water', 20, 45, 100, 'Squirtle.gif'),
            new Pokemon('Bulbasaur', 'Grass', 25, 40, 120, 'Bulbasaur.gif'),
            new Pokemon('Charmander', 'Fire', 30, 55, 80, 'Charmander.gif'),
            new Pokemon('Onix', 'Ground', 20, 30, 150, 'Onix.gif')
        ];

        const player2Pokemon = [
            new Pokemon('Squirtle', 'Water', 20, 45, 100, 'Squirtle.gif'),
            new Pokemon('Bulbasaur', 'Grass', 25, 40, 120, 'Bulbasaur.gif'),
            new Pokemon('Charmander', 'Fire', 30, 55, 80, 'Charmander.gif'),
            new Pokemon('Onix', 'Ground', 20, 30, 150, 'Onix.gif')
        ];

        // --- CACHE SELECTS ---
        const selectPlayer1 = document.querySelector('#player1-pokemon');
        const selectPlayer2 = document.querySelector('#player2-pokemon');

        // --- POPULATE DROPDOWNS ---
        player1Pokemon.forEach((pokemon, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.textContent = pokemon.name;
            selectPlayer1.appendChild(opt);
        });

        player2Pokemon.forEach((pokemon, index) => {
            const opt = document.createElement('option');
            opt.value = index;
            opt.textContent = pokemon.name;
            selectPlayer2.appendChild(opt);
        });

        // --- EVENT LISTENERS ---
        selectPlayer1.addEventListener('change', function () {
            updatePokemon('player1', this.value);
        });

        selectPlayer2.addEventListener('change', function () {
            updatePokemon('player2', this.value);
        });

        document.querySelector('#player1-attack').addEventListener('click', function () {
            attackPokemon('player1', 'player2',
                player1Pokemon[selectPlayer1.value],
                player2Pokemon[selectPlayer2.value]);
        });

        document.querySelector('#player2-attack').addEventListener('click', function () {
            attackPokemon('player2', 'player1',
                player2Pokemon[selectPlayer2.value],
                player1Pokemon[selectPlayer1.value]);
        });

        document.querySelector('#player1-heal').addEventListener('click', function () {
            healPokemon('player1', selectPlayer1.value);
        });

        document.querySelector('#player2-heal').addEventListener('click', function () {
            healPokemon('player2', selectPlayer2.value);
        });

        // NEW v3: reads name inputs from the modal and updates the card headers
        document.querySelector('#changePlayerNames').addEventListener('click', function () {
            const name1 = document.querySelector('#player1-fullname').value.trim();
            const name2 = document.querySelector('#player2-fullname').value.trim();
            // Only update if the field is not empty — keep current name otherwise
            if (name1) {
                playerState.player1.name = name1;
                document.querySelector('#player1-name').textContent = name1;
            }
            if (name2) {
                playerState.player2.name = name2;
                document.querySelector('#player2-name').textContent = name2;
            }
        });

        // --- updatePokemon() ---
        // Array lookup eliminates player1/player2 branching — single code path for both
        function updatePokemon(player, pokemonId) {
            if (pokemonId === '-1') return;

            const pokemonArray = (player === 'player1') ? player1Pokemon : player2Pokemon;
            const pokemon = pokemonArray[pokemonId];
            const percent = pokemon.hpPercent();

            document.querySelector(`#${player}-img`).src = `img/${pokemon.image}`;
            document.querySelector(`#${player}-type`).textContent = pokemon.type;
            document.querySelector(`#${player}-min`).textContent = pokemon.attackMin;
            document.querySelector(`#${player}-max`).textContent = pokemon.attackMax;
            document.querySelector(`#${player}-hp`).textContent = pokemon.hp();

            const progressBar = document.querySelector(`#${player}-progress`);
            progressBar.style.width = `${percent}%`;
            progressBar.textContent = percent > 0 ? `${percent}%` : '';
        }

        // --- attackPokemon() ---
        function attackPokemon(playerAttack, playerDefend, attacker, defender) {
            if (attacker.currentHP <= 0) {
                alert(`${attacker.name} has fainted — you can't attack!`);
                return;
            }

            const damage = attacker.attack();
            defender.currentHP -= damage;

            // NEW v3: clamp currentHP to 0 — prevents negative values showing in the UI
            if (defender.currentHP < 0) defender.currentHP = 0;

            updatePokemon(playerDefend, document.querySelector(`#${playerDefend}-pokemon`).value);

            const actionInfo = document.querySelector('#actioninfo');
            if (damage === 0) {
                actionInfo.textContent = `${attacker.name} missed their attack!`;
            } else if (defender.currentHP <= 0) {
                actionInfo.textContent =
                    `${attacker.name} attacks with ${damage} damage — ${defender.name} has fainted!`;
            } else {
                actionInfo.textContent =
                    `${attacker.name} attacks with ${damage} damage — ${defender.name} has ${defender.currentHP} HP remaining.`;
            }
        }

        // --- healPokemon() ---
        // NEW v3: uses one hyper potion to restore 50 HP (capped at base HP).
        // Guards: Pokémon must be selected, player must have potions remaining,
        // and the Pokémon must not have fainted (can't heal a fainted Pokémon).
        function healPokemon(player, pokemonId) {
            if (pokemonId === '-1') {
                console.log('Select a Pokémon first.');
                return;
            }

            const pokemonArray = (player === 'player1') ? player1Pokemon : player2Pokemon;
            const pokemon = pokemonArray[pokemonId];
            const state = playerState[player];

            if (pokemon.currentHP <= 0) {
                document.querySelector('#actioninfo').textContent =
                    `${pokemon.name} has fainted — hyper potion cannot be used!`;
                return;
            }

            if (state.potions <= 0) {
                document.querySelector('#actioninfo').textContent =
                    `${state.name} is out of hyper potions!`;
                return;
            }

            pokemon.hyperPotion();
            state.potions--;

            // Update potion counter and refresh the card
            document.querySelector(`#${player}-hyperpotion`).textContent = state.potions;
            updatePokemon(player, pokemonId);

            document.querySelector('#actioninfo').textContent =
                `${pokemon.name} used a hyper potion — now at ${pokemon.currentHP} HP. ` +
                `(${state.potions} potion${state.potions !== 1 ? 's' : ''} remaining)`;
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-JEW9xMcG8R+pH31jmWH6WWP0WintQrMb4s7ZOdauHnUtxwoG2vI5DkLtS3qm9Ekf"
        crossorigin="anonymous"></script>
</body>

</html>
