<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <title>Exercise 1 - Arrays: Vegetables and Fruits</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">IW</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" target="_blank" href="https://www.w3schools.com/js/DEFAULT.asp">W3Schools
                            JS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" target="_blank"
                            href="https://developer.mozilla.org/en-US/docs/Web/JavaScript">MDN JS docs</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownMenuLink" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">Specific</a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                            <li><a class="dropdown-item" target="_blank"
                                    href="https://www.w3schools.com/js/js_random.asp">Stack #1</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container">
        <div class="row">
            <div class="col">
                <h1>Exercise 1 - Arrays: Vegetables and Fruits</h1>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        Vegetables and Fruits
                    </div>
                    <div class="card-body">
                        <div id="fruits"></div>
                        <div id="vegetables"></div>
                        <div id="result"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        // ============================================================
        // Step 1: Create two arrays with items
        // ============================================================
        const vegetables = ["Carrot", "Lettuce", "Cauliflower", "Broccoli", "Spinach"];
        const fruits = ["Apple", "Banana", "Orange", "Strawberry", "Kiwi"];

        // ============================================================
        // Step 2: Print both arrays separately with comma + space separator
        // ============================================================
        // join(', ') converts array to string with comma and space between elements
        document.getElementById("vegetables").innerHTML =
            '<strong>Vegetables:</strong> ' + vegetables.join(', ');

        document.getElementById("fruits").innerHTML =
            '<strong>Fruits:</strong> ' + fruits.join(', ');

        // ============================================================
        // Step 3: Merge both arrays and print as string
        // ============================================================
        // concat() creates a new array combining both arrays
        const combined = vegetables.concat(fruits);

        // Display the merged array as a string
        document.getElementById("result").innerHTML =
            '<strong>Combined (Vegetables + Fruits):</strong> ' + combined.join(', ');

        // ============================================================
        // Console output for debugging
        // ============================================================
        console.log('=== EXERCISE 1 - COMPLETE ===');
        console.log('Vegetables:', vegetables.join(', '));
        console.log('Fruits:', fruits.join(', '));
        console.log('Combined:', combined.join(', '));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW"
        crossorigin="anonymous"></script>
</body>

</html>
