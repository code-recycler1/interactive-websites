<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
    <title>Exercise 4 - Light Bulb</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">IW</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown"
                aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" target="_blank" href="https://www.w3schools.com/js/DEFAULT.asp">W3Schools
                            JS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" target="_blank"
                            href="https://developer.mozilla.org/en-US/docs/Web/JavaScript">MDN JS docs</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownMenuLink" role="button"
                            data-bs-toggle="dropdown" aria-expanded="false">Specific</a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
                            <li><a class="dropdown-item" target="_blank"
                                    href="https://www.w3schools.com/js/js_random.asp">Stack #1</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container">
        <div class="row">
            <div class="col">
                <h1>Exercise 4 - Light Bulb</h1>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        Light Bulb
                    </div>
                    <div class="card-body text-center">
                        <button id="lightOnBtn" class="btn btn-success">Turn the light ON</button>
                        <img id="lightBulb" src="img/pic_bulboff.gif" alt="Light bulb" class="mx-3">
                        <button id="lightOffBtn" class="btn btn-danger">Turn the light OFF</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        // ============================================================
        // LIGHT BULB TOGGLE EXERCISE
        // ============================================================

        // Image paths
        const LIGHT_ON = 'img/pic_bulbon.gif';
        const LIGHT_OFF = 'img/pic_bulboff.gif';

        // Get DOM elements
        const lightBulb = document.getElementById('lightBulb');
        const lightOnBtn = document.getElementById('lightOnBtn');
        const lightOffBtn = document.getElementById('lightOffBtn');

        /**
         * Turn the light ON
         * Changes the image source to the lit bulb
         */
        function turnLightOn() {
            lightBulb.src = LIGHT_ON;
            console.log('Light turned ON');
        }

        /**
         * Turn the light OFF
         * Changes the image source to the unlit bulb
         */
        function turnLightOff() {
            lightBulb.src = LIGHT_OFF;
            console.log('Light turned OFF');
        }

        // Add event listeners to buttons
        lightOnBtn.addEventListener('click', turnLightOn);
        lightOffBtn.addEventListener('click', turnLightOff);

        // Console output for debugging
        console.log('=== EXERCISE 4 - INITIALIZED ===');
        console.log('Light bulb starts: OFF');
        console.log('Click "Turn the light ON" to light up the bulb');
        console.log('Click "Turn the light OFF" to turn it off');
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ygbV9kiqUc6oa4msXn9868pTtWMgiQaeYH7/t7LECLbyPA2x65Kgf80OJFdroafW"
        crossorigin="anonymous"></script>
</body>

</html>
